     3. Claude Artifact 沙盒 — 預覽環境網路受限；部署到 GitHub Pages 後正常
══════════════════════════════════════════════════════════════════════════════ */

const YF_V8 = s => `https://query1.finance.yahoo.com/v8/finance/chart/${s}?interval=1d&range=3mo`;
const YF_V7 = s => `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${s}&fields=regularMarketPrice,regularMarketPreviousClose`;

function buildProxies(sym) {
  const v8 = YF_V8(sym), v7 = YF_V7(sym);
  const e8 = encodeURIComponent(v8), e7 = encodeURIComponent(v7);
  return [
    { url: v8, type: "v8" },
    { url: v7, type: "v7" },
    { url: `https://api.allorigins.win/raw?url=${e8}`, type: "v8" },
    { url: `https://api.allorigins.win/raw?url=${e7}`, type: "v7" },
    { url: `https://corsproxy.io/?${e8}`, type: "v8" },
    { url: `https://api.codetabs.com/v1/proxy?quest=${e8}`, type: "v8" },
    { url: `https://proxy.cors.sh/${v8}`, type: "v8" },
  ];
}

function parseV8(j, sym) {
  const q = j?.chart?.result?.[0]; if (!q) throw new Error("no v8 result");
  const closes = q.indicators?.quote?.[0]?.close ?? [];
  const meta = q.meta ?? {};
  const price = meta.regularMarketPrice ?? closes.filter(Boolean).at(-1) ?? 0;
  const prev  = meta.previousClose      ?? closes.filter(Boolean).at(-2) ?? price;
  if (!price) throw new Error("zero price");
  return { sym, price, prev, closes: closes.filter(Boolean) };
}

function parseV7(j, sym) {
  const r = j?.quoteResponse?.result?.[0]; if (!r) throw new Error("no v7 result");
  const price = r.regularMarketPrice ?? 0;
  const prev  = r.regularMarketPreviousClose ?? price;
  if (!price) throw new Error("zero price");
  return { sym, price, prev, closes: [] };
}

async function fetchYahoo(sym) {
  const proxies = buildProxies(sym);
  const ctrls   = proxies.map(() => new AbortController());
  try {
    const result = await Promise.any(
      proxies.map(({ url, type }, i) =>
        fetch(url, { signal: ctrls[i].signal })
          .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
          .then(j => type === "v7" ? parseV7(j, sym) : parseV8(j, sym))
      )
    );
    ctrls.forEach(c => c.abort());
    return result;
  } catch (e) {
    ctrls.forEach(c => c.abort());
    console.warn(`fetchYahoo(${sym}) 全部失敗:`, e?.message ?? e);
    return null;
  }
}

async function fetchAllPrices(syms) {
  const BATCH = 3;
  const out = {};
  for (let i = 0; i < syms.length; i += BATCH) {
    const batch = syms.slice(i, i + BATCH);
    const res   = await Promise.allSettled(batch.map(fetchYahoo));
    res.forEach((r, j) => { out[batch[j]] = r.status === "fulfilled" ? r.value : null; });
  }
  return out;
}

/* ── 板塊歷史價格：透過 v8 API 取得特定日期的收盤價 ── */
async function fetchSectorPerf(startDate, endDate) {
  // startDate, endDate: "YYYY-MM-DD" 字串
  var p1 = Math.floor(new Date(startDate).getTime() / 1000);
  var p2 = Math.floor(new Date(endDate).getTime() / 1000) + 86400; // +1 day to include end date
  var results = [];
  for (var i = 0; i < SECTOR_ETFS.length; i += 3) {
    var batch = SECTOR_ETFS.slice(i, i + 3);
    var batchRes = await Promise.allSettled(batch.map(function(sec) {
      var url = "https://query1.finance.yahoo.com/v8/finance/chart/" + sec.sym + "?period1=" + p1 + "&period2=" + p2 + "&interval=1d";
      var eUrl = encodeURIComponent(url);
      var proxies = [
        url,
        "https://api.allorigins.win/raw?url=" + eUrl,
        "https://corsproxy.io/?" + eUrl,
        "https://api.codetabs.com/v1/proxy?quest=" + eUrl,
      ];
      var ctrls = proxies.map(function() { return new AbortController(); });
      return Promise.any(
        proxies.map(function(pUrl, j) {
          return fetch(pUrl, { signal: ctrls[j].signal })
            .then(function(r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
            .then(function(j2) {
              var res = j2?.chart?.result?.[0];
              if (!res) throw new Error("no data");
              var closes = res.indicators?.quote?.[0]?.close?.filter(Boolean) || [];
              var timestamps = res.timestamp || [];
              if (closes.length < 1) throw new Error("no closes");
              var startPrice = closes[0];
              var endPrice = closes[closes.length - 1];
              var pct = ((endPrice - startPrice) / startPrice * 100);
              return {
                sym: sec.sym, name: sec.name, icon: sec.icon, color: sec.color,
                startPrice: startPrice, endPrice: endPrice, pct: pct,
                closes: closes, timestamps: timestamps
              };
            });
        })
      ).then(function(r) { ctrls.forEach(function(c) { c.abort(); }); return r; })
       .catch(function(e) { ctrls.forEach(function(c) { c.abort(); }); return null; });
    }));
    batchRes.forEach(function(r) {
      results.push(r.status === "fulfilled" ? r.value : null);
    });
  }
  return results.filter(Boolean);
}

/* ── UW 期權現價抓取 ── */
async function fetchOptionPrices(positions, uwKey) {
  // 從持倉中取出所有期權，按標的分組
  if(!uwKey) return {};
  var optPositions = positions.filter(function(p){ return isOptionType(p.type); });
  if(!optPositions.length) return {};
  // 取得不重複的標的列表
  var syms = Array.from(new Set(optPositions.map(function(p){ return p.sym; })));
  var optPrices = {};
  for(var i=0; i<syms.length; i++){
    var sym = syms[i];
    try{
      var data = await uwFetch(uwKey, "/api/options/contracts/"+sym);
      var contracts = data?.data || data?.contracts || [];
      contracts.forEach(function(c){
        // UW contract 格式: strike, expiration, option_type, ask, bid, last, mid
        var strike = String(Math.round(Number(c.strike||c.strike_price||0)));
        var expRaw = c.expiration||c.expiry||c.expiration_date||"";
        // 統一格式 YYYY-MM-DD
        var exp = expRaw.length===10 ? expRaw : "";
        if(!exp) return;
        var optType = (c.option_type||c.type||"").toUpperCase();
        if(optType==="C") optType="CALL";
        if(optType==="P") optType="PUT";
        var mid = c.mid_price || ((Number(c.ask||0)+Number(c.bid||0))/2) || Number(c.last||c.last_price||0);
        if(mid>0){
          var key = sym+"_"+optType+"_"+strike+"_"+exp;
          optPrices[key] = {price: mid, bid: Number(c.bid||0), ask: Number(c.ask||0)};
        }
      });
    }catch(e){
      console.warn("UW optionPrice("+sym+") failed:", e.message);
    }
  }
  return optPrices;
}

/* UW API — 透過 Cloudflare Worker 代理 */
const UW_WORKER = "https://solitary-wood-898d.justest521.workers.dev";

async function uwFetch(key, endpoint) {
  try {
    const workerUrl = UW_WORKER + endpoint +
      (endpoint.includes("?") ? "&" : "?") + `_key=${encodeURIComponent(key)}`;
    const r = await fetch(workerUrl);
    if (!r.ok) throw new Error("Worker HTTP " + r.status);
    const j = await r.json();
    if (j?.error) throw new Error(j.error);
    return j;
  } catch(e) {
    console.warn("UW Worker fetch failed:", endpoint, e?.message);
    return null;
  }
}

async function fetchUWFlow(key,limit=100,apiParams){
  // 正確 UW API 欄位 (根據 OpenAPI spec):
  // limit, newer_than, vol_greater_oi, is_otm, is_ask_side, is_bid_side, min_premium etc.
  // 同時呼叫兩個 endpoint：全市場 flow-alerts + 補充 lit-flow
  const params = apiParams || ("limit=" + limit + "&min_premium=25000");
  const [j1, j2] = await Promise.allSettled([
    uwFetch(key, "/api/option-trades/flow-alerts?" + params),
    uwFetch(key, "/api/lit-flow/recent?limit=50")
  ]);
  const rows1 = (j1.status==="fulfilled"&&j1.value?.data) ? j1.value.data : [];
  const rows2 = (j2.status==="fulfilled"&&j2.value?.data) ? j2.value.data : [];

  function mapRow(f, i) {
    const type = (f.type||f.put_call||f.option_type||"CALL").toUpperCase();
    // 情緒：ask側=看多(主動買)，bid側=看空(主動賣)，否則由 type 推斷
    const askPrem  = Number(f.total_ask_side_prem||0);
    const bidPrem  = Number(f.total_bid_side_prem||0);
    const totalPrem = Number(f.total_premium||f.premium||0);
    let sent = "NEUTRAL";
    if (askPrem > 0 || bidPrem > 0) {
      sent = askPrem >= bidPrem ? "bullish" : "bearish";
    } else {
      sent = type === "CALL" ? "bullish" : "bearish";
    }
    // IV: 優先 iv_change/implied_volatility，UW flow-alerts 通常沒有原始IV
    const ivRaw = f.implied_volatility||f.iv||f.iv_start||f.volatility||0;
    const ivVal = ivRaw > 1 ? (ivRaw/100).toFixed(2) : Number(ivRaw).toFixed(2);
    // Exchange: UW flow-alerts 沒有此欄位，用 issue_type 補充
    const exch = f.exchange||f.venue||f.market_center||
                 (f.issue_type ? f.issue_type.substring(0,6) : "—");
    return {
      id: i,
      time: (function(t){ return t ? new Date(t).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"}) : "—"; })(f.created_at||f.filled_at||f.time),
      sym:    f.ticker||f.ticker_symbol||f.symbol||"—",
      type:   type,
      strike: f.strike||f.strike_price||"—",
      exp:    f.expiry||f.expiry_date||"—",
      prem:   totalPrem || askPrem + bidPrem,
      size:   Number(f.total_size||f.volume||f.size||0),
      oi:     Number(f.open_interest||0),
      iv:     ivVal,
      sent:   sent,
      unusual: !!(f.alert_rule && f.alert_rule !== "RepeatedHits" || f.is_unusual),
      sweep:   !!(f.has_sweep||f.is_sweep),
      is_ask:  askPrem > bidPrem,
      vol_oi:  f.volume_oi_ratio ? Number(f.volume_oi_ratio).toFixed(2) : "—",
      exchange: exch,
      alert_rule: f.alert_rule||"",
      issue_type: f.issue_type||"",
    };
  }

  // 合併兩個來源，去重（以 option_chain 或 sym+type+strike+exp 去重）
  const seen = new Set();
  const merged = [];
  [...rows1, ...rows2].forEach(function(f, i) {
    const key2 = f.option_chain || ((f.ticker||"")+"_"+(f.type||"")+"_"+(f.strike||"")+"_"+(f.expiry||""));
    if (!seen.has(key2)) { seen.add(key2); merged.push(f); }
  });

  return merged.slice(0, limit).map(mapRow);
}

async function fetchUWDark(key,limit=100){
  // UW darkpool/recent 真實欄位: ticker, executed_at, price, size, nbbo_ask, nbbo_bid,
  // market_center, premium (=notional), canceled_at
  const j = await uwFetch(key, "/api/darkpool/recent?limit=" + limit);
  if (!j) return null;
  const rows = j?.data ?? j?.results ?? [];
  return rows.slice(0, limit).map(function(d, i) {
    const price   = Number(d.price||d.executed_price||0);
    const shares  = Number(d.size||d.volume||d.quantity||0);
    const notional= Number(d.premium||d.notional_value||d.notional||(price*shares)||0);
    // Side: UW darkpool 沒有直接 side，用 price vs nbbo_ask/bid 推斷
    let side = "UNKNOWN";
    if (d.side||d.aggressor_side) {
      side = (d.side||d.aggressor_side).toUpperCase();
    } else if (d.nbbo_ask && price >= Number(d.nbbo_ask)) {
      side = "BUY";
    } else if (d.nbbo_bid && price <= Number(d.nbbo_bid)) {
      side = "SELL";
    } else {
      side = notional > 1000000 ? "BLOCK" : "DARK";
    }
    return {
      id: i,
      time: (function(t){ return t ? new Date(t).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit",second:"2-digit"}) : "—"; })(d.executed_at||d.filled_at||d.time),
      sym:     d.ticker||d.ticker_symbol||d.underlying||d.symbol||"—",
      price:   price.toFixed(2),
      shares:  shares,
      notional: notional,
      type:    notional >= 1000000 ? "BLOCK" : "DARK",
      side:    side,
      venue:   d.market_center||d.venue||d.exchange||"—",
    };
  });
}

function Spark({data=[],color="#d97706",w=100,h=36}){
  if(data.length<2)return null;
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/rng)*h}`);
  const fill=[...pts,`${w},${h}`,`0,${h}`];
  const gid=`sg${color.replace(/[^a-z0-9]/gi,"")}${w}`;
  return(
    <svg width={w} height={h} style={{overflow:"visible"}}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor={color} stopOpacity=".25"/>
        <stop offset="100%" stopColor={color} stopOpacity="0"/>
      </linearGradient></defs>
      <polygon points={fill.join(" ")} fill={`url(#${gid})`}/>
      <polyline points={pts.join(" ")} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
      <circle cx={pts[pts.length-1].split(",")[0]} cy={pts[pts.length-1].split(",")[1]} r="3" fill={color}/>
    </svg>
  );
}

/* ══════════════════════════════════════════════════════════════════════════════
   圖表元件
══════════════════════════════════════════════════════════════════════════════ */
function EqChart({data}){
  const W=640,H=155,pad={t:8,r:8,b:22,l:50};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const vals=data.map(d=>d.v);
  const mn=Math.min(...vals)*.998,mx=Math.max(...vals)*1.002;
  const pts=data.map((d,i)=>`${pad.l+(i/(data.length-1))*iW},${pad.t+(1-(d.v-mn)/(mx-mn))*iH}`);
  const fill=[...pts,`${pad.l+iW},${pad.t+iH}`,`${pad.l},${pad.t+iH}`];
  const ticks=[0,.25,.5,.75,1].map(t=>({y:pad.t+(1-t)*iH,l:((mn+t*(mx-mn))/1000).toFixed(0)+"K"}));
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{fontFamily:"'IBM Plex Mono',monospace"}}>
      <defs><linearGradient id="eqg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor="#d97706" stopOpacity=".22"/>
        <stop offset="100%" stopColor="#d97706" stopOpacity="0"/>
      </linearGradient></defs>
      {ticks.map((t,i)=>(
        <g key={i}>
          <line x1={pad.l} y1={t.y} x2={pad.l+iW} y2={t.y} stroke="#ffffff0c" strokeWidth="1"/>
          <text x={pad.l-6} y={t.y+4} textAnchor="end" fill="#ffffff35" fontSize="10">{t.l}</text>
        </g>
      ))}
      <polygon points={fill.join(" ")} fill="url(#eqg)"/>
      <polyline points={pts.join(" ")} fill="none" stroke="#d97706" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={pts[pts.length-1].split(",")[0]} cy={pts[pts.length-1].split(",")[1]} r="4" fill="#d97706" style={{filter:"drop-shadow(0 0 5px #ffa726)"}}/>
    </svg>
  );
}

  // ── 持倉風險掃描 helper ──
  function scanPositionRisk(pos, curPrice, totalNav) {
    var checks = [];
    var isOption = pos.type === "CALL" || pos.type === "PUT";
    if (!isOption) return { checks: checks, score: 100, isOption: false };
    var strikeNum = Number(pos.strike) || 0;
    var costNum = Number(pos.entry) || 0;
    var qtyNum = Math.abs(Number(pos.qty) || 0);
    var totalCost = costNum * qtyNum * 100;
    // DTE
    var dte = 999;
    if (pos.exp) {
      var expDate = new Date(pos.exp + "T00:00:00");
      dte = Math.round((expDate - new Date()) / (1000 * 60 * 60 * 24));
    }
    // OTM distance
    var otmPct = curPrice > 0 && strikeNum > 0 ? Math.abs(strikeNum - curPrice) / curPrice * 100 : 0;
    // P&L
    // We don't have live option price, so skip P&L for now
    // Check 1: OTM within 20%
    var otmOk = otmPct <= 20;
    checks.push({ label: "OTM " + otmPct.toFixed(1) + "%", ok: otmOk, detail: otmOk ? "行權價距現價 20% 以內" : "超過 20% OTM，勝率低" });
    // Check 2: DTE >= 45
    var dteOk = dte >= 45;
    checks.push({ label: dte + " 天", ok: dteOk, detail: dteOk ? "距到期 45+ 天" : (dte < 0 ? "已過期！" : "距到期不足 45 天，theta 加速") });
    // Check 3: position size < 10%
    var sizePct = totalNav > 0 ? totalCost / totalNav * 100 : 0;
    var sizeOk = sizePct < 10;
    checks.push({ label: sizePct.toFixed(1) + "%", ok: sizeOk, detail: sizeOk ? "佔總資金 < 10%" : "佔總資金 " + sizePct.toFixed(1) + "%，過重！" });
    // Check 4: DTE < 30 warning
    var dteCritical = dte < 30 && dte >= 0;
    if (dteCritical) checks.push({ label: "快到期", ok: false, detail: "距到期 < 30 天，考慮減倉或滾倉" });
    // Score
    var score = 100;
    if (!otmOk) score -= 30;
    if (!dteOk) score -= 25;
    if (!sizeOk) score -= 25;
    if (dteCritical) score -= 20;
    return { checks: checks, score: Math.max(0, score), isOption: true, dte: dte, otmPct: otmPct, sizePct: sizePct };
  }

  //   sentReq    → is_ask_side / is_bid_side
  //   sweep:true → is_sweep=true
  //   unusual    → (no direct API param, UW flow-alerts 本身就是 unusual alerts)
  //   optType    → is_call / is_put
  var presetToApiParams = function(id) {
    var p = presetParams[id];
    if (!p || id === "all") return "limit=100&min_premium=25000";
    var q = [];
    q.push("limit=100");
    if (p.premMin && p.premMin > 0)  q.push("min_premium=" + p.premMin);
    else                             q.push("min_premium=25000");
    if (p.sizeMin && p.sizeMin > 0)  q.push("min_size=" + p.sizeMin);
    if (p.dteMin  && p.dteMin > 0)   q.push("min_dte=" + p.dteMin);
    if (p.dteMax  && p.dteMax < 999) q.push("max_dte=" + p.dteMax);
    if (p.volOiMin && p.volOiMin >= 1) q.push("vol_greater_oi=true");
    else if (p.volOiMin && p.volOiMin > 0) q.push("min_volume_oi_ratio=" + p.volOiMin);
    if (p.otm === true)   q.push("is_otm=true");
    if (p.sweep === true) q.push("is_sweep=true");
    if (p.sentReq === "bullish") q.push("is_ask_side=true");
    if (p.sentReq === "bearish") q.push("is_bid_side=true");
    if (p.optType === "CALL")   q.push("is_call=true");
    if (p.optType === "PUT")    q.push("is_put=true");
    // ivMax/ivMin: UW API 沒有直接 IV 篩選，改為前端 filter
    return q.join("&");
  };

  var makeFilter = function(id){
    var p = presetParams[id];
    if(!p) return function(){ return true; };
    return function(f){
      var dte     = Math.round((new Date(f.exp)-Date.now())/86400000);
      var iv      = Number(f.iv)*100;
      var size    = Number(f.size)||0;
      var oi      = Number(f.oi)||0;
      var volOi   = oi>0 ? size/oi : 0;
      var strike  = Number(f.strike)||0;
      // 判斷 OTM：需要股價，用 prices 全局變數
      var spot    = (window.__ddh_prices&&window.__ddh_prices[f.sym]) ? window.__ddh_prices[f.sym].price : 0;
      var isOTM   = spot>0 ? (f.type==="CALL" ? strike>spot : strike<spot) : true;
      var sentLow = (f.sent||"").toLowerCase();

      if(p.premMin  && f.prem < p.premMin) return false;
      if(p.sizeMin  && size < p.sizeMin)   return false;
      if(p.dteMin!=null && dte < p.dteMin) return false;
      if(p.dteMax!=null && p.dteMax<999 && dte > p.dteMax) return false;
      if(p.ivMax!=null  && p.ivMax<999  && iv > p.ivMax)   return false;
      if(p.ivMin!=null  && p.ivMin>0    && iv < p.ivMin)   return false;
      if(p.volOiMin && volOi < p.volOiMin) return false;

  // ── Firstrade CSV 解析器（真實格式）──
  // 欄位：Symbol, Quantity, Price, Action, Description, TradeDate, SettledDate, Interest, Amount, Commission, Fee, CUSIP, RecordType
  // 期權：Symbol 為空，Description 格式 "CALL TSLA   06/18/26   960"
  const parseFirstradeCSV = React.useCallback(function(text){
    var lines = text.trim().split(/\r?\n/);
    if(lines.length < 2) return {parsed:[], errors:["CSV 內容不足"]};

    // 解析 CSV row（支援引號包覆）
    function parseRow(line){
      var result=[], cur="", inQ=false;
      for(var i=0;i<line.length;i++){
        var c=line[i];
        if(c==='"'){inQ=!inQ;}
        else if(c===','&&!inQ){result.push(cur.trim());cur="";}
        else{cur+=c;}
      }
      result.push(cur.trim());
      return result;
    }

    var headers = parseRow(lines[0]).map(function(h){return h.replace(/"/g,"").toLowerCase().trim();});
    function col(name){ return headers.indexOf(name); }

    var cSym    = col("symbol");
    var cQty    = col("quantity");
    var cPrice  = col("price");
    var cAction = col("action");
    var cDesc   = col("description");
    var cDate   = col("tradedate");
    var cAmt    = col("amount");
    var cComm   = col("commission");
    var cFee    = col("fee");
    var cRtype  = col("recordtype");

    var errors = [];
    if(cSym<0||cQty<0||cAction<0||cDesc<0) errors.push("欄位不符，請確認是 Firstrade Excel CSV 格式");

    // 期權 Description 解析：CALL TSLA   06/18/26   960
    function parseOptDesc(desc){
      var m = desc.match(/^(CALL|PUT)\s+(\S+)\s+(\d{2}\/\d{2}\/\d{2})\s+([\d.]+)/);
      if(!m) return null;
      var parts = m[3].split("/");
      var exp = "20"+parts[2]+"-"+parts[0]+"-"+parts[1];
      return {optType:m[1], sym:m[2].toUpperCase(), strike:parseFloat(m[4]).toFixed(0), exp:exp};
    }

    var parsed = [];
    for(var r=1;r<lines.length;r++){
      if(!lines[r].trim()) continue;
      var row = parseRow(lines[r]);
      var rtype = cRtype>=0 ? row[cRtype].replace(/"/g,"").trim() : "Trade";
      if(rtype !== "Trade") continue;

      var action = cAction>=0 ? row[cAction].replace(/"/g,"").trim() : "";
      if(action!=="BUY" && action!=="SELL") continue;

      var sym   = cSym>=0   ? row[cSym]  .replace(/"/g,"").trim().toUpperCase() : "";
      var desc  = cDesc>=0  ? row[cDesc] .replace(/"/g,"").trim() : "";
      var qtyRaw= cQty>=0   ? row[cQty]  .replace(/[",]/g,"").trim() : "0";
      var priceR= cPrice>=0 ? row[cPrice].replace(/[",]/g,"").trim() : "0";
      var dateS = cDate>=0  ? row[cDate] .replace(/"/g,"").trim() : "";
      var comm  = (cComm>=0 ? Math.abs(parseFloat(row[cComm].replace(/[",]/g,"")||0)):0)
                + (cFee>=0  ? Math.abs(parseFloat(row[cFee] .replace(/[",]/g,"")||0)):0);

      var qty   = Math.abs(parseFloat(qtyRaw)||0);
      var price = Math.abs(parseFloat(priceR)||0);
      if(qty===0 || price===0) continue;

      // 判斷是期權還是股票
      var optInfo = (!sym) ? parseOptDesc(desc) : null;
      var isOpt   = !!optInfo;

      if(!sym && !optInfo) continue; // 跳過無法識別的

      parsed.push({
        id:       r,
        date:     dateS,
        sym:      isOpt ? optInfo.sym : sym,
        qty:      qty,
        price:    price,
        action:   action,
        commission: comm,
        isOption: isOpt,
        optType:  isOpt ? optInfo.optType : null,
        optStrike:isOpt ? optInfo.strike  : null,
        optExp:   isOpt ? optInfo.exp     : null,
        desc:     desc,
      });
    }

    return {parsed:parsed, errors:errors, headers:headers, rawCount:lines.length-1};
  },[]);

    // ── CSV → 持倉聚合（FIFO 配對）──
  const csvToPositions = React.useCallback(function(trades){
    var lots = {};
    var realizedPnl = 0;
    var totalFees   = 0;
    var tradeCount  = 0;
    var winCount    = 0;

    trades.forEach(function(t){
      var key = t.isOption
        ? (t.sym+"_"+t.optType+"_"+t.optStrike+"_"+t.optExp)
        : t.sym;
      totalFees += t.commission||0;

      if(t.action==="BUY"){
        if(!lots[key]) lots[key] = {queue:[], meta:t};
        lots[key].queue.push({qty:t.qty, price:t.price});
      } else if(t.action==="SELL"){
        // 如果這個 key 完全沒有買入記錄（CSV 範圍外的舊持倉），直接跳過
        if(!lots[key] || lots[key].queue.length===0) return;
        var remaining = t.qty;
        while(remaining>0 && lots[key].queue.length>0){
          var lot = lots[key].queue[0];
          var matched = Math.min(remaining, lot.qty);
          var mult = t.isOption ? 100 : 1;
          var pnl  = (t.price - lot.price) * matched * mult;
          realizedPnl += pnl;
          tradeCount++;
          if(pnl>0) winCount++;
          lot.qty -= matched;
          remaining -= matched;
          if(lot.qty<=0.0001) lots[key].queue.shift();
        }
      }
    });

    // 建立持倉
    var positions = [];
    Object.keys(lots).forEach(function(key){
      var l = lots[key];
      var totalQty = l.queue.reduce(function(a,x){return a+x.qty;},0);
      if(totalQty<0.0001) return;
      var avgCost = l.queue.reduce(function(a,x){return a+x.price*x.qty;},0)/totalQty;
      var m = l.meta;
      positions.push({
        id:    Date.now()+Math.random(),
        sym:   m.sym,
        type:  m.isOption ? m.optType : "股票",
        qty:   Math.round(totalQty*10000)/10000,
        entry: avgCost.toFixed(4),
        strike: m.optStrike||"",
        exp:    m.optExp||"",
        side:  "多頭",
        note:  "Firstrade CSV",
      });
    });

    return {
      positions:    positions,
      realizedPnl:  Math.round(realizedPnl),
      totalFees:    Math.round(totalFees*100)/100,
      tradeCount:   tradeCount,
      winRate:      tradeCount>0 ? Math.round(winCount/tradeCount*1000)/10 : 0,
    };
  },[]);

  // ── 期權策略推斷（依溢價、類型、情緒、IV、sweep） ──
  const inferStrategy = (f) => {
    var type = f.type;
    var iv = Number(f.iv)*100;
    var sent = (f.sent||"").toLowerCase();
    var unusual = f.unusual;
    var sweep = f.sweep;
    var daysToExp = Math.max(0, Math.round((new Date(f.exp)-Date.now())/86400000));

    if(sweep && type==="CALL" && daysToExp<=14) return {label:"急攻多單", color:"#10b981", tip:"掃單+短期CALL → 機構快速建倉看漲"};
    if(sweep && type==="PUT"  && daysToExp<=14) return {label:"急攻空單", color:"#ef4444", tip:"掃單+短期PUT → 機構快速建倉看跌"};
    if(unusual && type==="CALL" && iv>60)       return {label:"高IV買權", color:"#d97706", tip:"異常高IV CALL → 可能財報前保護性買入或賭漲"};
    if(unusual && type==="PUT"  && iv>60)       return {label:"高IV保護", color:"#8b5cf6", tip:"異常高IV PUT → 機構對沖/防守性保護倉"};
    if(type==="CALL" && daysToExp>=30 && daysToExp<=90 && sent==="bullish") return {label:"波段做多", color:"#10b981", tip:"中期CALL+看多情緒 → 波段持有策略"};
    if(type==="PUT"  && daysToExp>=30 && daysToExp<=90 && sent==="bearish") return {label:"波段做空", color:"#ef4444", tip:"中期PUT+看空情緒 → 波段空頭策略"};
    if(type==="CALL" && daysToExp>90)           return {label:"長多佈局", color:"#3b82f6", tip:"長期CALL → 長線看多或LEAPS策略"};
    if(type==="PUT"  && daysToExp>90)           return {label:"長空對沖", color:"#7c3aed", tip:"長期PUT → 長線對沖或方向性空頭"};
    if(iv<30 && type==="CALL")                  return {label:"低IV收租", color:"#80cbc4", tip:"低IV賣出covered call或牛市價差"};
    if(iv<30 && type==="PUT")                   return {label:"低IV賣PUT", color:"#ef9a9a", tip:"低IV賣出現金擔保PUT，收取時間價值"};
    if(daysToExp<=7)                            return {label:"週選賭注", color:"#ffd54f", tip:"極短期期權 → 高風險方向性賭注"};
    return {label: type==="CALL"?"看多佈局":"看空佈局", color: type==="CALL"?"#00e5a080":"#ff4d6d80", tip:""};
  };


  // ── 從報告內文取標題：跳過作者名/日期行，找第一個有意義的標題行 ──
  const extractTitle = (aiText, reportText, ts) => {
    if(!reportText) return null;
    var lines = reportText.trim().split("\n").map(function(l){
      return l.trim().replace(/^[#*>\-=`]+\s*/,"").replace(/\*\*/g,"").trim();
    }).filter(function(l){ return l.length>0; });

    // Substack / blog junk line patterns to skip
    var skipPatterns = [
      /^[\d\s]*$/,
      /^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s/i,
      /^\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2}/,
      /^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}/,
      /^20\d{6,8}$/,
      /^\u2219\s*(Paid|Free|Preview)/i,
      /^(Like|Reply|Share|Restack|Comment|Discussion|Write a comment)/i,
      /^\u00a9\s*\d{4}/,
      /^(Privacy|Terms|Collection notice)/i,
      /^(Start your|Get the app|Substack is)/i,
      /^\d+\s*(Likes?|Restacks?|comments?)$/i,
      /^(Source|Image|Photo|\u5716\u7247\u4f86\u6e90|\u8cc7\u6599\u4f86\u6e90)\s*[:\uff1a]/i,
    ];
    var isAuthorLine = function(l, idx){
      if(l.length>40 || l.length<2) return false;
      if(/^[A-Za-z][A-Za-z\s]{0,30}$/.test(l) && l.split(/\s+/).length<=5 && !/\b(the|and|for|how|why|what|this|that|from|with|into|will|can|are|not|all|but|has|its|our|was|you|top)\b/i.test(l)) return true;
      if(idx>0 && lines[idx-1] && lines[idx-1].trim()===l) return true;
      return false;
    };
    var isCategoryLine = function(l){
      if(l.length>25 || l.length<2) return false;
      if(/^[A-Za-z\u4e00-\u9fff\s\/\u00b7\-]+$/.test(l) && !/[\uff0c\u3002\uff1f\uff01\uff1a\u300c\u300d\u3010\u3011\u3001]/.test(l) && l.length<20) return true;
      return false;
    };

    for(var i=0; i<Math.min(lines.length, 15); i++){
      var l = lines[i];
      if(l.length<5) continue;
      var skip = false;
      for(var p=0; p<skipPatterns.length; p++){
        if(skipPatterns[p].test(l)){ skip=true; break; }
      }
      if(skip) continue;
      if(isAuthorLine(l, i)) continue;
      if(i<5 && isCategoryLine(l)) continue;
      return l.length>55 ? l.slice(0,55)+"\u2026" : l;
    }
    return null;
  };

            var ma50  = p.ma50  ? "$"+Number(p.ma50).toFixed(2)  : "N/A";
            var ma200 = p.ma200 ? "$"+Number(p.ma200).toFixed(2) : "N/A";
            var rsi   = p.rsi   ? Number(p.rsi).toFixed(1)  : "N/A";
            var currentPct52 = (p.yearHigh && p.yearLow) ?
              ((p.price - p.yearLow)/(p.yearHigh - p.yearLow)*100).toFixed(1)+"%" : "N/A";
            var trendVsMA50  = p.ma50  ? (p.price > p.ma50  ? "站上MA50↑"  : "跌破MA50↓")  : "";
            var trendVsMA200 = p.ma200 ? (p.price > p.ma200 ? "站上MA200↑" : "跌破MA200↓") : "";
            techArr.push(sym+" 現價:$"+p.price.toFixed(2)
              +" 52W區間:["+price52wLow+"~"+price52wHigh+"] 52W位置:"+currentPct52
              +" MA50:"+ma50+" MA200:"+ma200
              +" "+trendVsMA50+" "+trendVsMA200
              +(rsi!=="N/A"?" RSI:"+rsi+(Number(rsi)>70?"[超買]":Number(rsi)<30?"[超賣]":""):""));
          } else {
            techArr.push(sym+": 技術面數據暫無");
          }
        }
        if(techArr.length) techLines = techArr.join(NL);
      }catch(te){ techLines = "技術面數據取得失敗"; }

      // ── 3個月歷史快照統計 ──
      var threeMonthsAgo = Date.now() - 90*24*3600*1000;
      var recentSnaps = flowSnaps.filter(function(s){ return s.ts > threeMonthsAgo; });
      var tickerRe = /\b([A-Z]{2,5})\b/g;
      var tickers = [];
      var m;
      while((m = tickerRe.exec(reportText)) !== null){
        if(tickers.indexOf(m[1])<0) tickers.push(m[1]);
      }
      var histMap = {};
      recentSnaps.forEach(function(snap){
        (snap.flow||[]).forEach(function(f){
          if(tickers.indexOf(f.sym)>=0){
            if(!histMap[f.sym]) histMap[f.sym]={callPrem:0,putPrem:0,unusual:0,sweep:0,count:0};
            histMap[f.sym].count++;
            if(f.type==="CALL") histMap[f.sym].callPrem+=f.prem||0;
            else histMap[f.sym].putPrem+=f.prem||0;
            if(f.unusual) histMap[f.sym].unusual++;
            if(f.sweep) histMap[f.sym].sweep++;
          }
        });
        (snap.dark||[]).forEach(function(d){
          if(tickers.indexOf(d.sym)>=0){
            if(!histMap[d.sym]) histMap[d.sym]={callPrem:0,putPrem:0,unusual:0,sweep:0,count:0};
            histMap[d.sym].count++;
          }
        });
      });
      var dateRangeStart = recentSnaps.length ? new Date(recentSnaps[recentSnaps.length-1].ts).toLocaleDateString("zh-TW",{month:"2-digit",day:"2-digit"}) : "";
      var dateRangeEnd   = recentSnaps.length ? new Date(recentSnaps[0].ts).toLocaleDateString("zh-TW",{month:"2-digit",day:"2-digit"}) : "";
      var histLines = Object.keys(histMap).map(function(sym){
        var h = histMap[sym];
        var bias = h.callPrem > h.putPrem ? "偏多" : h.putPrem > h.callPrem ? "偏空" : "中性";
        return sym+" 出現"+h.count+"次（"+dateRangeStart+"～"+dateRangeEnd+"）CALL溢價:"+fmtM(h.callPrem)+" PUT溢價:"+fmtM(h.putPrem)+" 異常:"+h.unusual+"筆 掃單:"+h.sweep+"筆 機構方向:"+bias;
      }).join(NL) || "無相關歷史記錄（快照數："+recentSnaps.length+"）";

      // ── 驗證模式強化 ──
      var validationSection = "";
      if(existingReport && existingReport.ts){
        var reportDate = new Date(existingReport.ts).toLocaleString("zh-TW");
        var daysPassed = Math.floor((Date.now()-existingReport.ts)/86400000);
        // 提取原始報告中的具體預測（找帶 YYYY-MM-DD 的行）
        var origPredictions = (existingReport.aiAnalysis||"").split("\n")
          .filter(function(l){ return /\d{4}-\d{2}-\d{2}|進場|出場|目標|止損/.test(l); })
          .slice(0,10).join(NL);
        validationSection = [
          "","【⚠️ 報告驗證模式 - 強化版】",
          "原始報告時間："+reportDate+"（距今"+daysPassed+"天）",
          "原始報告內容："+existingReport.content,
          "原始AI策略預測（含日期）："+NL+(origPredictions||"無具體日期預測"),
          "現在市場狀態（期權流、暗池、技術面均已更新）",
          ""
        ].join(NL);
      }

      var isValidation = !!(existingReport && existingReport.ts);
      var daysPassed2 = isValidation ? Math.floor((Date.now()-(existingReport.ts||Date.now()))/86400000) : 0;

      var parts = [
        "你是專業美股期權分析師。分析時間："+nowStr,
        "","【研究報告】",reportText,
        validationSection,
        "【即時期權流（前15筆）】",flowLines||"暫無數據","",
        "【即時暗池（前10筆）】",darkLines||"暫無數據","",
        "【技術面數據】",techLines,"",
        "【3個月歷史期權流統計】",histLines,"",
        "請依序完成（每項都要有具體數字，不能含糊）：",
        "1. 【交叉比對】報告提到的股票在即時與歷史期權流/暗池中的機構資金方向是否與報告觀點一致？技術面（MA50/MA200/RSI）是否支撐？",
        "2. 【策略推薦】根據報告觀點＋市場情緒＋技術面，推薦2-3個期權策略。每個策略須明確標示：操作日期建議、行使價、到期日（YYYY-MM-DD格式）、建議持有天數、最大虧損承受金額",
        "3. 【時間點建議】給出具體操作時間窗口：進場日期範圍、出場條件、最晚止損日期（均用YYYY-MM-DD標示）",
        isValidation
          ? "4. 【報告驗證 - 詳細版】距原始報告"+daysPassed2+"天後：(a)原始各項預測是否準確（逐條對比）(b)技術面是否按預期走 (c)機構方向是否如預測 (d)整體準確度：X/100分，理由是... (e)若當時照策略操作，現在損益估算"
          : "4. 【提醒建議】給出1-2個提醒（格式：[提醒] 條件 | 建議操作）",
        "5. 【網路鄉民看法】請搜尋並總結目前市場上對報告提到的主要標的之討論熱度與主流觀點（Reddit WallStreetBets/options、Twitter/X、主流財經論壇），分析：(a)散戶情緒（看多%/看空%估算）(b)近期最熱討論點 (c)鄉民觀點是否與機構方向一致或背離 (d)極端情緒警示（過度樂觀/悲觀）",
        "","⚠️ 每項分析都必須標明分析時間："+nowStr,
        "用繁體中文回答，結構清晰，重點突出，每個section都要有標題【XXX】。"
      ];
      var prompt = parts.join(NL);

      // ── 呼叫 Anthropic API（透過 Cloudflare Worker 代理）──
      var apiResp = await fetch(UW_WORKER + "/api/ai", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:4096,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user",content:prompt}]
        })
      });
      if(!apiResp.ok){
        var errBody = "";
        try{ errBody = await apiResp.text(); }catch(ignored){}
        throw new Error("Worker HTTP " + apiResp.status + (errBody ? ": " + errBody.slice(0,200) : ""));
      }
      var apiData = await apiResp.json();
      // 組合所有 text blocks
      var text = "";
      if(apiData && apiData.content){
        apiData.content.forEach(function(block){
          if(block.type==="text") text += block.text;
        });
      }
      if(!text) text = "分析失敗，請重試";
      setAiResult(text);

      // ── 自動儲存 ──
      if(!existingReport && reportInput.trim()){
        var now2 = new Date();
        var timeStr2 = now2.toLocaleString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
        var cat = "其他";
        var rt = reportText.toLowerCase();
        if(/財報|earnings|revenue|eps|q[1-4]/.test(rt)) cat = "財報";
        else if(/fed|fomc|利率|升息|降息|inflation|通膨/.test(rt)) cat = "總經";
        else if(/技術分析|support|resistance|突破|ma|rsi|macd|k線/.test(rt)) cat = "技術";
        else if(/產業|sector|晶片|ai|半導體|cloud|藥|生技/.test(rt)) cat = "產業";
        else if(/期權|option|call|put|iv|delta|gamma/.test(rt)) cat = "期權";

        var autoTitle = reportTitle.trim();
        if(!autoTitle){
          var aiLines = text.split("\n").map(function(l){return l.trim().replace(/^#+\s*/,"").replace(/\*\*/g,"").trim();}).filter(Boolean);
          var titleFromAI = "";
          for(var ai=0; ai<Math.min(aiLines.length,5); ai++){
            var al = aiLines[ai];
            if(al.length>8 && !/^[1-5][.、]$/.test(al) && !/^【.{1,4}】$/.test(al)){
              titleFromAI = al.length>45 ? al.slice(0,45)+"…" : al;
              break;
            }
          }
          if(!titleFromAI){
            var firstLines = reportText.trim().split("\n").map(function(l){
              return l.trim().replace(/^[#*>\-=_~`]+\s*/,"").replace(/\*\*/g,"").replace(/^\[.+\]\s*/,"").trim();
            }).filter(function(l){ return l.length>6; });
            titleFromAI = firstLines.length>0 ? (firstLines[0].length>45?firstLines[0].slice(0,45)+"…":firstLines[0]) : "";
          }
          var articleDate = extractArticleDate(reportText);
          var prefixDate = articleDate || now2;
          var datePrefix = (prefixDate.getMonth()+1).toString().padStart(2,"0")+"/"+(prefixDate.getDate()).toString().padStart(2,"0");
          autoTitle = titleFromAI ? "["+datePrefix+"] "+titleFromAI : cat+"研究 "+timeStr2;
        }
        var newR = {
          id:Date.now(), ts:Date.now(), timeStr:timeStr2,
          title:autoTitle, category:cat,
          content:reportInput.trim(), aiAnalysis:text
        };
        setReports(function(prev){ return [newR,...prev]; });
        cloudSaveReport(newR);
      }
    }catch(e){
      setAiResult("AI 分析失敗："+e.message);
    }
    setAiLoading(false);
  };
  const saveReport = ()=>{
    if(!reportInput.trim())return;
    const now = new Date();
    const timeStr = now.toLocaleString("zh-TW",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});
    var rt2 = reportInput.trim().toLowerCase();
    var cat2 = "其他";
    if(/財報|earnings|revenue|eps|q[1-4]/.test(rt2)) cat2="財報";
    else if(/fed|fomc|利率|升息|降息|inflation|通膨/.test(rt2)) cat2="總經";
    else if(/技術分析|support|resistance|突破|ma|rsi|macd|k線/.test(rt2)) cat2="技術";
    else if(/產業|sector|晶片|ai|半導體|cloud|藥|生技/.test(rt2)) cat2="產業";
    else if(/期權|option|call|put|iv|delta|gamma/.test(rt2)) cat2="期權";
    var manualTitle = reportTitle.trim();
    if(!manualTitle){
      var extracted2 = extractTitle(aiResult, reportInput.trim(), now);
      var articleDate2 = extractArticleDate(reportInput.trim());
      var prefixDate2 = articleDate2 || now;
      var datePrefix2 = (prefixDate2.getMonth()+1).toString().padStart(2,"0")+"/"+(prefixDate2.getDate()).toString().padStart(2,"0");
      if(extracted2) manualTitle = "["+datePrefix2+"] "+extracted2;
      if(!manualTitle) manualTitle = "研究報告 "+timeStr;
    }
    const r={
      id:Date.now(),
      ts:Date.now(),
      timeStr:timeStr,
      title:manualTitle,
      category:cat2,
      content:reportInput.trim(),
      aiAnalysis:aiResult,
    };
    setReports(prev=>[r,...prev]);
    cloudSaveReport(r);
    setReportInput(""); setReportTitle(""); setAiResult(null);
  };

  /* ── AI 風控建議：整合持倉風險 + 研究分析 → 操作建議 ── */
  const generateRiskAdvice = async function(posIndex) {
    if(riskAdviceLoading) return;
    setRiskAdviceLoading(true);
    setRiskAdvice(null);
    setRiskAdvicePos(posIndex);
    try {
      var NL = "\n";
      var optPos = userPositions.filter(function(p){ return isOptionType(p.type); });

      // 組合所有持倉風險掃描
      var posLines = optPos.map(function(p, i){
        var curP = prices[p.sym] ? prices[p.sym].price : 0;
        var scan = scanPositionRisk(p, curP, nav);
        var checksStr = scan.checks.map(function(c){ return (c.ok?"✓":"✗")+" "+c.label+": "+c.detail; }).join("; ");
        var selected = (posIndex !== null && posIndex !== undefined && posIndex === i) ? " 【← 使用者關注此持倉】" : "";
        return (i+1)+". "+p.sym+" "+p.type+" $"+p.strike+" exp:"+p.exp+" qty:"+p.qty+" cost:$"+p.entry+
          " | 現價:$"+(curP||"N/A")+" | 風險分數:"+scan.score+"/100 | "+checksStr+selected;
      }).join(NL);

      // 找出相關研究報告（匹配持倉標的）
      var tickers = {};
      optPos.forEach(function(p){ if(p.sym) tickers[p.sym.toUpperCase()] = true; });
      var relatedReports = reports.filter(function(r){
        var txt = ((r.content||"")+" "+(r.title||"")+" "+(r.aiAnalysis||"")).toUpperCase();
        return Object.keys(tickers).some(function(t){ return txt.indexOf(t) >= 0; });
      }).slice(0, 5);

      var reportSection = relatedReports.length > 0
        ? relatedReports.map(function(r, i){
            var dateStr = r.timeStr || new Date(r.ts).toLocaleDateString("zh-TW");
            var analysis = (r.aiAnalysis||"").slice(0, 800);
            return "報告"+(i+1)+": ["+dateStr+"] "+(r.title||"無標題")+NL+
              "分類: "+(r.category||"其他")+NL+
              "AI分析摘要: "+analysis+(analysis.length>=800?"...":"");
          }).join(NL+NL)
        : "尚無相關研究報告";

      // 即時期權流（與持倉相關）
      var relatedFlow = flow.filter(function(f){
        return tickers[f.sym && f.sym.toUpperCase()];
      }).slice(0, 10);
      var flowLines = relatedFlow.length > 0
        ? relatedFlow.map(function(f){ return f.sym+" "+f.type+" $"+f.strike+" exp:"+f.exp+" prem:$"+(f.prem||f.premium)+" sent:"+f.sent; }).join(NL)
        : "暫無相關期權流";

      // 暗池相關
      var relatedDark = dark.filter(function(d){
        return tickers[d.sym && d.sym.toUpperCase()];
      }).slice(0, 5);
      var darkLines = relatedDark.length > 0
        ? relatedDark.map(function(d){ return d.sym+" $"+d.price+" size:"+d.size+" "+d.time; }).join(NL)
        : "暫無相關暗池數據";

      var nowStr = new Date().toLocaleString("zh-TW");
      var totalNav = nav || 0;

      var prompt = [
        "你是專業美股期權風控分析師與交易策略顧問。分析時間："+nowStr,
        "",
        "【使用者持倉概覽】（總資金 $"+totalNav.toLocaleString()+"）",
        posLines || "尚無持倉",
        "",
        "【相關研究報告】",
        reportSection,
        "",
        "【相關即時期權流】",
        flowLines,
        "",
        "【相關暗池數據】",
        darkLines,
        "",
        "請依序完成以下分析（每項都要有具體數字，不能含糊）：",
        "",
        "1. 【整體風險評估】",
        "   - 持倉組合的整體風險等級（低/中/高/危險），總曝險金額",
        "   - 是否過度集中某個方向或標的",
        "   - 與研究報告觀點是否一致",
        "",
        "2. 【個別持倉診斷】",
        "   針對每個持倉給出：",
        "   - 當前狀態（健康/注意/危險）",
        "   - 研究報告是否支持這個方向",
        "   - 機構資金流（期權流+暗池）是否順風",
        "",
        "3. 【操作建議】",
        "   針對每個持倉明確建議（只選一個）：",
        "   ✅ 繼續持有（說明理由）",
        "   🔄 滾倉（建議新的到期日/行使價）",
        "   ⚠️ 減倉（建議減多少%）",
        "   🚨 出場（立即或限時）",
        "   每個建議都要附帶：觸發條件、目標價位、停損價位",
        "",
        "4. 【新開倉機會】",
        "   根據研究報告+期權流+暗池，有沒有值得新開倉的機會？",
        "   如有，明確建議：標的、方向、行使價、到期日、倉位大小（佔總資金%）",
        "",
        "5. 【風險日曆】",
        "   未來一週內影響持倉的重要事件（財報、Fed、經濟數據等）",
        "   每個事件標明：日期、影響的持倉、建議的應對",
        "",
        "⚠️ 每項分析都必須標明分析時間："+nowStr,
        "用繁體中文回答，結構清晰，重點突出，每個section都要有標題【XXX】。",
        "操作建議要具體到可執行，不要模糊的「建議觀望」。"
      ].join(NL);

      var apiResp = await fetch(UW_WORKER + "/api/ai", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 4096,
          tools: [{type: "web_search_20250305", name: "web_search"}],
          messages: [{role: "user", content: prompt}]
        })
      });
      if(!apiResp.ok){
        var errBody = "";
        try{ errBody = await apiResp.text(); }catch(ignored){}
        throw new Error("Worker HTTP "+apiResp.status+(errBody?": "+errBody.slice(0,200):""));
      }
      var apiData = await apiResp.json();
      var text = "";
      if(apiData && apiData.content){
        apiData.content.forEach(function(block){
          if(block.type==="text") text += block.text;
        });
      }
      if(!text) text = "分析失敗，請重試";
      setRiskAdvice(text);
    } catch(e) {
      setRiskAdvice("AI 分析失敗："+e.message);
    }
    setRiskAdviceLoading(false);
  };

  const addReminder = (msg, daysFromNow=1)=>{
    if(Notification.permission==="default") Notification.requestPermission();
    const r={id:Date.now(),msg,at:Date.now()+daysFromNow*86400000,fired:false,created:Date.now()};

  const dismissReminder = id=>setReminders(prev=>prev.filter(r=>r.id!==id));

  /* ── 渲染 ───────────────────────────────────────────────────────────────── */
  return(
    <div style={{display:"flex",height:"100vh",background:"transparent",
      fontFamily:"'Inter','Noto Sans TC',-apple-system,sans-serif",color:"#f0f0f0",overflow:"hidden"}}>
      <style>{`
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap');

                        var range = mx - mn || 1;
                        var sparkH = 24, sparkW = 50;
                        var sparkPts = closes.map(function(c,i){ return (i/(closes.length-1||1))*sparkW+","+(sparkH-(c-mn)/range*sparkH); }).join(" ");
                        return React.createElement("div",{key:sec.sym,style:{display:"grid",gridTemplateColumns:"44px 1fr 90px 90px 120px 60px",
                          padding:"12px 18px",alignItems:"center",
                          borderBottom:"1px solid rgba(255,255,255,.04)",
                          background:idx%2===0?"transparent":"rgba(255,255,255,.02)",
                          transition:"background .15s"}},
                          /* 排名 */
                          React.createElement("span",{style:{fontSize:13,fontWeight:700,color:idx<3?(isPos?"#10b981":"#ef4444"):"rgba(255,255,255,.4)"}},idx+1),
                          /* 板塊名 */
                          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10}},
                            React.createElement("span",{style:{fontSize:18}},sec.icon),
                            React.createElement("div",null,
                              React.createElement("div",{style:{fontSize:14,fontWeight:600,color:"#fff"}},sec.name),
                              React.createElement("div",{style:{fontSize:11,color:"rgba(255,255,255,.3)"}},sec.sym)
                            )
                          ),
                          /* 起始價 */
                          React.createElement("span",{style:{fontSize:13,color:"rgba(255,255,255,.5)",textAlign:"right",fontFamily:"'IBM Plex Mono',monospace"}},"$"+sec.startPrice.toFixed(2)),
                          /* 結束價 */
                          React.createElement("span",{style:{fontSize:13,color:"rgba(255,255,255,.5)",textAlign:"right",fontFamily:"'IBM Plex Mono',monospace"}},"$"+sec.endPrice.toFixed(2)),
                          /* 報酬率 + 彩色條 */
                          React.createElement("div",{style:{textAlign:"right",position:"relative"}},
                            React.createElement("div",{style:{fontSize:15,fontWeight:700,color:isPos?"#10b981":"#ef4444",fontFamily:"'IBM Plex Mono',monospace"}},
                              (isPos?"+":"")+sec.pct.toFixed(2)+"%"
                            ),
                            React.createElement("div",{style:{position:"absolute",bottom:-2,right:0,height:3,borderRadius:2,
                              width:barW,background:isPos?"linear-gradient(90deg,transparent,#10b981)":"linear-gradient(90deg,#ef4444,transparent)",
                              boxShadow:isPos?"0 0 8px rgba(16,185,129,.3)":"0 0 8px rgba(239,68,68,.3)",opacity:.6}})
                          ),
                          /* Mini sparkline */
                          React.createElement("div",{style:{display:"flex",justifyContent:"center"}},
                            closes.length>2?React.createElement("svg",{width:sparkW,height:sparkH,style:{overflow:"visible"}},
                              React.createElement("polyline",{points:sparkPts,fill:"none",
                                stroke:isPos?"#10b981":"#ef4444",strokeWidth:1.5,strokeLinejoin:"round",opacity:.7})
                            ):React.createElement("span",{style:{fontSize:10,color:"rgba(255,255,255,.2)"}},"—")
                          )
                        );
                      })}
                      {/* 底部統計 */}
                      <div style={{padding:"14px 18px",background:"rgba(255,255,255,.04)",borderTop:"1px solid rgba(255,255,255,.08)",
                        display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontSize:12,color:"rgba(255,255,255,.4)"}}>
                          {"共 "+sectorData.length+" 個板塊 · 數據來源：Yahoo Finance (S&P 500 Sector ETFs)"}
                        </span>
                        <div style={{display:"flex",gap:16}}>
                          <span style={{fontSize:12,color:"#10b981"}}>
                            {"上漲 "+sectorData.filter(function(s){return s.pct>=0;}).length}
                          </span>
                          <span style={{fontSize:12,color:"#ef4444"}}>
                            {"下跌 "+sectorData.filter(function(s){return s.pct<0;}).length}
                          </span>
                          <span style={{fontSize:12,color:"rgba(255,255,255,.5)",fontWeight:600}}>
                            {"平均 "+(sectorData.reduce(function(a,s){return a+s.pct;},0)/sectorData.length).toFixed(2)+"%"}
                          </span>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* 查詢完但無數據 */}
                  {sectorData&&sectorData.length===0&&!sectorLoading&&(
                    <div style={{textAlign:"center",padding:40}}>
                      <div style={{fontSize:32,marginBottom:8}}>⚠️</div>
                      <div style={{fontSize:13,color:"rgba(255,255,255,.4)"}}>查無數據，請確認日期區間是否有效（需為交易日）</div>
                    </div>
                  )}
                    </div>
                  )}
                </div>
              )}

              {/* ── 判斷樹 ── */}
              {sopTab==="tree"&&(
                <div style={{display:"flex",flexDirection:"column",gap:16}}>
                  <div style={{fontSize:12,color:"#6b7280",marginBottom:4}}>每天開盤前跑一遍，每個問題只有兩個答案</div>
                  <div style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.06)",borderRadius:16,backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",overflow:"hidden"}}>
                    {[
                      "催化劑事件已發生，股票卻沒如預期移動？",
                      "虧損是否超過停損線？",
                      "距到期 < 21 天且 OTM > 10%？",
                      "大盤趨勢與持倉方向明確相反？"
                    ].map(function(q,i){
                      var triggered=sopTreeState[i];
                      return React.createElement("div",{key:i,onClick:function(){
                        setSopTreeState(function(prev){var next=prev.slice();next[i]=!next[i];return next;});
                      },style:{display:"flex",alignItems:"center",gap:12,padding:"15px 16px",cursor:"pointer",
                        borderBottom:i<3?"1px solid rgba(255,255,255,.05)":"none",
                        background:triggered?"#1a0a0a":"transparent"}},
                        React.createElement("div",{style:{width:16,height:16,border:"1.5px solid "+(triggered?"#dc2626":"#374151"),
                          borderRadius:3,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
                          background:triggered?"#dc2626":"transparent"}},
                          triggered&&React.createElement("span",{style:{color:"#fff",fontSize:10,lineHeight:1}},"✓")
                        ),
                        React.createElement("div",{style:{flex:1}},
                          React.createElement("div",{style:{fontSize:13,color:triggered?"#f87171":"#e5e7eb"}},q),
                          triggered&&React.createElement("div",{style:{fontSize:12,color:"#ef4444",fontWeight:600,marginTop:3}},
                            ["→ 出場，事件過了不要留","→ 立即出場，不猶豫","→ 出場，theta 最猛的階段","→ 出場，不跟趨勢作對"][i])
                        ),
                        React.createElement("span",{style:{fontSize:11,fontWeight:600,color:"#ef4444",background:"rgba(239,68,68,.12)",
                          padding:"3px 10px",borderRadius:3,whiteSpace:"nowrap"}},"是 → 出場")
                      );
                    })}
                    {/* 全部安全 */}
                    {sopTreeState.every(function(v){return !v;})&&(
                      <div style={{background:"rgba(34,197,94,.04)",display:"flex",alignItems:"center",gap:12,padding:"15px 16px"}}>
                        <span style={{fontSize:18,color:"#22c55e"}}>&#10003;</span>
                        <span style={{fontSize:13,color:"#22c55e",fontWeight:600}}>四項全否 → 安心持有，明天再跑一遍</span>
                      </div>
                    )}
                  </div>

                  {/* 警示/安全 */}
                  {sopTreeState.some(Boolean)&&(
                    <div style={{padding:"12px 16px",background:"rgba(239,68,68,.05)",border:"1px solid #7f1d1d",borderRadius:8,
                      fontSize:13,color:"#ef4444",fontWeight:600}}>
                      {"⚠️ 有部位需要處理，請先出場再繼續交易"}
                    </div>
                  )}

                  {/* 確認按鈕 */}
                  <div onClick={function(){
                    setSopConfirmed(true);
                    localStorage.setItem("sop_confirmed",new Date().toDateString());
                    // 儲存到雲端
                    cloudSaveDailyReview({
                      ticker:"DAILY_SOP",
                      option_type:"REVIEW",
                      current_pnl_pct:0,
                      stop_loss_pct:0,
                      stop_triggered:sopTreeState.some(Boolean),
                      catalyst_alive:!sopTreeState[0],
                      trend_against:sopTreeState[3],
                      dte_warning:sopTreeState[2],
                      action_taken:sopTreeState.some(Boolean)?"MONITOR":"HOLD",
                      note:"Daily SOP "+new Date().toISOString().slice(0,10)
                    });
                  }} style={{padding:"12px",background:sopTreeState.some(Boolean)?"#dc2626":"#EAB308",
                    borderRadius:8,cursor:"pointer",textAlign:"center",fontSize:14,fontWeight:700,
                    color:sopTreeState.some(Boolean)?"#fff":"#000"}}>
                    {sopTreeState.some(Boolean)?"確認（有警示，請先處理）":"確認完成，開始交易"}
                  </div>

                  <div style={{background:"rgba(255,255,255,.04)",borderLeft:"3px solid #EAB308",padding:"14px 18px",borderRadius:"0 8px 8px 0",
                    fontSize:13,color:"#9ca3af",lineHeight:1.8}}>
                    {"沒有催化劑就不開倉。"}
                    <br/>{"有催化劑但觸及停損就出場。"}
                    <br/><span style={{color:"#EAB308"}}>{"這兩句話值一百萬。"}</span>
                  </div>
                </div>
              )}

            </div>
          )}

        </div>
      </div>

      {/* ══════ Dev/Mock 切換 ══════ */}
      {devMode&&(
        <div style={{position:"fixed",bottom:12,right:12,zIndex:100,padding:"8px 16px",
          background:"rgba(217,119,6,.08)",border:"1px solid rgba(217,119,6,.2)",borderRadius:12,
          fontSize:11,color:"#d97706",fontWeight:600,backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}}>
          {"DEV MODE — Mock Data"}
        </div>
      )}

      {/* ════════════════ 登入 Modal ════════════════ */}
      {loginOpen&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",zIndex:9999,
          display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"rgba(12,15,25,.9)",border:"1px solid rgba(255,255,255,.08)",borderRadius:24,
            padding:"36px 32px",width:380,boxShadow:"0 24px 64px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06)",
            backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)"}}>
            {/* Logo */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:24}}>
              <div style={{width:36,height:36,borderRadius:5,
                background:"linear-gradient(135deg,#ffa726,#ff6d00)",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:900,color:"#000"}}>D</div>
              <div>
                <div style={{fontFamily:"'Inter',sans-serif",fontSize:14,fontWeight:900,color:"#ffffff"}}>DONDONHAPPY</div>
                <div style={{fontSize:10,color:"rgba(255,255,255,.25)",letterSpacing:1.5}}>期權 · 量化 · 暗池</div>
              </div>
            </div>

            {/* Tab */}
            <div style={{display:"flex",gap:6,marginBottom:20}}>
              {["login","setup"].map(m=>(
                <div key={m} onClick={()=>{setLoginMode(m);setLoginErr("");}}
                  style={{flex:1,padding:"7px",borderRadius:6,cursor:"pointer",textAlign:"center",fontSize:13,
                    background:loginMode===m?"#d9770620":"#ffffff08",
                    border:`1px solid ${loginMode===m?"#d9770650":"#ffffff10"}`,
                    color:loginMode===m?"#d97706":"#ffffff40",fontWeight:loginMode===m?700:400}}>
                  {m==="login"?"🔐 登入":"⚙️ 首次設定"}
                </div>
              ))}
            </div>

            {loginMode==="login"?(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div style={{fontSize:12,color:"rgba(255,255,255,.3)"}}>輸入你設定的密碼解鎖 UW API 金鑰</div>
                <input
                  type="password" value={loginPwd}
                  onChange={e=>setLoginPwd(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&handleLogin()}
                  placeholder="密碼" autoFocus
                  style={{padding:"10px 12px",fontSize:14,borderRadius:4,
                    background:"rgba(255,255,255,.06)",border:"1px solid #ffffff20",color:"#ffffff"}}/>
                <div onClick={handleLogin}
                  style={{padding:"11px",borderRadius:10,cursor:"pointer",textAlign:"center",
                    background:loginLoading?"#ffffff10":"#d9770620",
                    border:"1px solid #ffa72650",fontSize:14,color:"#d97706",fontWeight:700}}>
                  {loginLoading?"解密中…":"登入"}
                </div>
              </div>
            ):(
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                <div style={{fontSize:12,color:"rgba(255,255,255,.3)"}}>設定一組密碼保護你的 UW API 金鑰，儲存於雲端</div>
                <input
                  type="text" value={setupKey}
                  onChange={e=>setSetupKey(e.target.value)}
                  placeholder="UW API 金鑰 (UUID 格式)"
                  style={{padding:"10px 12px",fontSize:13,borderRadius:4,
                    background:"rgba(255,255,255,.06)",border:"1px solid #ffffff20",color:"#ffffff"}}/>
                <input
                  type="password" value={setupPwd}
                  onChange={e=>setSetupPwd(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&handleSetup()}
                  placeholder="設定密碼（至少 6 字元）"
                  style={{padding:"10px 12px",fontSize:14,borderRadius:4,
                    background:"rgba(255,255,255,.06)",border:"1px solid #ffffff20",color:"#ffffff"}}/>
                <div onClick={handleSetup}
                  style={{padding:"11px",borderRadius:10,cursor:"pointer",textAlign:"center",
                    background:loginLoading?"#ffffff10":"#d9770620",
                    border:"1px solid #ffa72650",fontSize:14,color:"#d97706",fontWeight:700}}>
                  {loginLoading?"儲存中…":"加密儲存金鑰"}
                </div>
              </div>
            )}

            {loginErr&&(
              <div style={{marginTop:12,padding:"8px 12px",borderRadius:6,fontSize:12,
                background:loginErr.startsWith("✅")?"#10b98110":"#ff4d6d10",
                border:`1px solid ${loginErr.startsWith("✅")?"#10b98130":"#ef444430"}`,
                color:loginErr.startsWith("✅")?"#10b981":"#ef4444"}}>
                {loginErr}
              </div>
            )}

            {/* ☁️ Supabase 雲端報告庫 */}
            <div style={{marginTop:16,borderTop:"1px solid rgba(255,255,255,.04)",paddingTop:14}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <div style={{fontSize:11,color:"rgba(255,255,255,.4)",fontWeight:600}}>☁️ Supabase 雲端報告庫</div>
                <div style={{fontSize:10,padding:"2px 7px",borderRadius:3,
                  background:db?"#10b98118":"#ff4d6d12",
                  border:"1px solid "+(db?"#10b98140":"#ef444430"),
                  color:db?"#10b981":"#ef4444",fontWeight:600}}>
                  {db?"✅ 已連線":"⚠ 未連線"}
                </div>
              </div>
              <div style={{fontSize:10,color:"rgba(255,255,255,.3)",marginTop:2,fontFamily:"monospace",
                overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {window.location.hostname}
              </div>
              {db&&(
                <div
                  onClick={async function(){
                    try{
                      var res=await db.from("reports").select("id",{count:"exact",head:true});
                      if(res.error) throw res.error;
                      alert("✅ 連線正常！reports table 存在，共 "+(res.count||0)+" 筆記錄");
                    }catch(e){
                      alert("❌ 連線失敗："+e.message+"\n\n可能原因：\n1. reports table 未建立\n2. RLS 政策阻擋\n3. anon key 錯誤");
                    }
                  }}
                  style={{marginTop:6,padding:"5px 10px",fontSize:11,borderRadius:4,cursor:"pointer",
                    background:"#10b98115",border:"1px solid #10b98130",color:"#10b981",textAlign:"center"}}>
                  🔌 測試連線
                </div>
              )}
              {!db&&(
                <div style={{marginTop:8,padding:"10px 12px",background:"rgba(255,255,255,.06)",borderRadius:4,border:"1px solid #ffffff0d"}}>
                  <div style={{fontSize:10,color:"rgba(255,255,255,.3)",lineHeight:1.7}}>
                    <div style={{color:"rgba(255,255,255,.4)",fontWeight:600,marginBottom:4}}>📋 設定步驟：</div>
                    <div>1. 前往 <span style={{color:"#ffa726"}}>supabase.com</span> → 你的專案</div>
                    <div>2. Project Settings → API → 複製 <span style={{color:"#ffa726"}}>anon public</span> key</div>
                    <div>3. 貼上後離開輸入框（自動儲存重載）</div>
                    <div style={{marginTop:6,color:"rgba(255,255,255,.4)",fontWeight:600}}>🗃 首次使用請先建立 table：</div>
                  </div>
                  <div
                    onClick={function(){
                      var sql="create table if not exists reports (\n  id text primary key,\n  title text,\n  category text,\n  content text,\n  ai_analysis text,\n  ts bigint,\n  time_str text,\n  created_at timestamptz default now()\n);\nalter table reports enable row level security;\ncreate policy \"allow all\" on reports for all using (true) with check (true);";
                      navigator.clipboard.writeText(sql).then(function(){alert("✅ SQL 已複製！\n\n請到 Supabase → SQL Editor → New query → 貼上執行");});
                    }}
                    style={{marginTop:6,padding:"6px 10px",fontSize:10,borderRadius:4,cursor:"pointer",
                      background:"rgba(255,255,255,.06)",border:"1px solid #ffa72630",color:"#ffa726",
                      textAlign:"center",fontWeight:600}}>
                    📋 複製建表 SQL
                  </div>
                </div>
              )}
            </div>
            <div onClick={()=>setLoginOpen(false)}
              style={{marginTop:12,textAlign:"center",fontSize:12,color:"rgba(255,255,255,.3)",cursor:"pointer"}}>
              略過，使用模擬數據
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  /* ── 掛載 ── */
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));
  </script>
</body>
</html>
