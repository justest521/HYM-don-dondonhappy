  <!-- Configuration: Supabase anon key
       Hardcoded JWT lives in <head>. localStorage is opt-in override only — must look like a JWT
       (starts with "eyJ" and >100 chars), otherwise it's ignored to prevent stale/invalid values
       from breaking auth. -->
  <script>
    (function() {
      var lsKey = null;
      try { lsKey = localStorage.getItem('SUPABASE_ANON_KEY'); } catch (e) {}
      var validLs = typeof lsKey === 'string' && lsKey.length > 100 && lsKey.indexOf('eyJ') === 0;
      if (validLs) {
        window.__SUPABASE_ANON_KEY = lsKey;
      } else if (lsKey) {
        // stale/invalid value — purge so it doesn't keep breaking
        try { localStorage.removeItem('SUPABASE_ANON_KEY'); } catch (e) {}
        console.warn('[Supabase] Removed invalid localStorage anon key (len=' + lsKey.length + '); using hardcoded.');
      }
      // window.__SUPABASE_ANON_KEY already set in <head> with hardcoded JWT — leave it

      window.setSupabaseKey = function(key) {
        if (typeof key !== 'string' || key.length < 100 || key.indexOf('eyJ') !== 0) {
          console.error('[Supabase] setSupabaseKey: not a JWT (must start with "eyJ" and be >100 chars).');
          return;
        }
        localStorage.setItem('SUPABASE_ANON_KEY', key);
        location.reload();
      };
      window.clearSupabaseKey = function() {
        try { localStorage.removeItem('SUPABASE_ANON_KEY'); } catch (e) {}
        location.reload();
      };
    })();
  </script>

function scoreNetLiquidity(aboveMA) {

}

function scoreMoveIndex(value) {
  if (!isFinite(value)) return 50;
  if (value < 100) return 100;
  if (value <= 120) return 50;
  return 0;
}

function scoreT10Y2Y(value) {
  if (!isFinite(value)) return 50;
  // 課程的特殊邏輯：「解除倒掛」反而最危險
  // value 從負（倒掛中）變成接近 0 → DANGER
  // value < 0.20 = 還在倒掛或剛轉正未久 = 表面安全
  // 0.20-0.50 = 解除倒掛中段，1-3 個月內崩盤窗口
  // > 0.50 = 已完全解除，衰退即將到來 = DANGER
  if (value < 0.20) return 100;
  if (value <= 0.50) return 50;
  return 0;
}

function scoreRRG(leadingCount) {
  // 至少 2 個進攻型板塊在 Leading 區 → 100
  return leadingCount >= 2 ? 100 : 0;
}

function calcWeightedScore(scores) {
  return Object.entries(INDICATORS).reduce((total, [key, def]) => {
    const s = scores[key];
    return total + (isFinite(s) ? s * def.weight : 0);
  }, 0);
}

function getPositionBand(score) {
  return POSITION_BANDS.find((b) => score >= b.minScore && score <= b.maxScore) || POSITION_BANDS[POSITION_BANDS.length - 1];
}

// 經濟象限自動判斷（PMI + CPI 趨勢）
function getEconomicQuadrant(pmiValue, cpiTrend) {
  const pmiExpansion = pmiValue >= 50;
  const cpiRising = cpiTrend === 'rising';
  const cpiFalling = cpiTrend === 'falling';

  if (pmiExpansion && cpiFalling) return ECONOMIC_QUADRANTS.recovery;
  if (pmiExpansion && cpiRising)  return ECONOMIC_QUADRANTS.overheat;
  if (!pmiExpansion && cpiRising) return ECONOMIC_QUADRANTS.stagflation;
  if (!pmiExpansion && cpiFalling) return ECONOMIC_QUADRANTS.recession;
  // CPI stable → 看 PMI
  if (pmiExpansion) return ECONOMIC_QUADRANTS.recovery;
  return ECONOMIC_QUADRANTS.recession;
}

// L2 → L1 hedge budget 對應
function suggestL1HedgeBudget(macroScore, redAlerts) {
  const band = getPositionBand(macroScore);
  let suggested = band.hedgeBudgetBps;

  // 觸發紅色警報加碼 hedge
  redAlerts.forEach((alert) => {
    if (alert.severity === 'critical') suggested += 30;
    else if (alert.severity === 'high') suggested += 15;
  });

  return Math.min(suggested, 150);   // cap at 150 bps
}

// Batch fetch all series in one request
async function fetchFREDBatch() {
  const seriesList = Object.values(FRED_SERIES).join(',');
  // Need 200 daily observations to align with 25 weekly WALCL
  const url = WORKER_URL + '/api/fred/batch?series=' + seriesList + '&limit=200';
  const res = await fetch(url);
  if (!res.ok) {
    const text = await res.text();
    throw new Error('FRED batch fetch failed: HTTP ' + res.status + ' - ' + text.slice(0, 200));
  }
  const data = await res.json();
  // Reshape: data.series = [{ series: 'WALCL', observations: [...] }, ...]
  const byId = {};
  (data.series || []).forEach(s => { byId[s.series] = s.observations || []; });
  return byId;
}

// For a given target date, find the closest daily observation on or before
function alignToDate(targetDate, dailyObservations) {
  const target = new Date(targetDate).getTime();
  for (const obs of dailyObservations) {
    if (obs.value == null) continue;
    if (new Date(obs.date).getTime() <= target) return obs.value;
  }
  return null;
}

// Compute net liquidity series + 20-week MA
function computeNetLiquidityMA(walclObs, wtregenObs, rrpObs) {
  const walcl = (walclObs || []).filter(o => o.value != null);
  if (walcl.length === 0) return null;

  // For each WALCL weekly date, compute net = WALCL - aligned WTREGEN - aligned RRP
  const netSeries = walcl.slice(0, 25).map(w => {
    const wt = alignToDate(w.date, wtregenObs) || 0;
    const r = alignToDate(w.date, rrpObs) || 0;
    return {
      date: w.date,
      value: w.value - wt - r,
      walcl: w.value,
      tga: wt,
      rrp: r,
    };
  });

  if (netSeries.length === 0) return null;

  const latest = netSeries[0].value;
  const recent20 = netSeries.slice(0, Math.min(20, netSeries.length));
  const ma20 = recent20.reduce((s, o) => s + o.value, 0) / recent20.length;

  return {
    latest,
    ma20,
    aboveMA: latest > ma20,
    pctAboveMA: ((latest - ma20) / Math.abs(ma20)) * 100,
    series: netSeries,
    asOfDate: walcl[0].date,
  };
}

// CPI YoY trend over last 3 months
function inferCpiTrend(cpiObs) {
  const data = (cpiObs || []).filter(o => o.value != null);
  if (data.length < 14) return { trend: 'stable', latestYoY: null };

  // Compute YoY for each month
  const yoy = [];
  for (let i = 0; i < data.length - 12; i++) {
    const current = data[i].value;
    const yearAgo = data[i + 12].value;
    if (yearAgo > 0) yoy.push({ date: data[i].date, value: (current - yearAgo) / yearAgo });
  }
  if (yoy.length < 3) return { trend: 'stable', latestYoY: yoy[0]?.value };

  const latest = yoy[0].value;
  const threeAgo = yoy[2].value;
  const delta = latest - threeAgo;

  let trend;
  if (delta > 0.002) trend = 'rising';
  else if (delta < -0.002) trend = 'falling';
  else trend = 'stable';

  return { trend, latestYoY: latest, delta };
}

// Map Chicago Fed CFNAI-MA3 to a PMI-equivalent (FRED stopped publishing ISM in 2014).
// CFNAI 0 = trend growth → PMI 50, +1 = strong expansion → PMI ~60, -1 = contraction → PMI ~40.
// Clipped to [30, 70] so a single noisy month doesn't push it to absurd values.
function inferPMIFromCFNAI(cfnaiObs) {
  const data = (cfnaiObs || []).filter((o) => o.value != null);
  if (data.length === 0) return { pmi: null, cfnai: null };
  const latest = Number(data[0].value);
  if (!isFinite(latest)) return { pmi: null, cfnai: null };
  const pmi = Math.max(30, Math.min(70, 50 + latest * 10));
  return { pmi: parseFloat(pmi.toFixed(1)), cfnai: latest };
}

// Unemployment rising? Compare last 3 months avg vs prior 3 months
function inferUnemploymentRising(unrateObs) {
  const data = (unrateObs || []).filter(o => o.value != null);
  if (data.length < 6) return { rising: false, latest: null };

  const recent = data.slice(0, 3);
  const prior = data.slice(3, 6);
  const recentAvg = recent.reduce((s, o) => s + o.value, 0) / 3;
  const priorAvg = prior.reduce((s, o) => s + o.value, 0) / 3;

  return {
    rising: recentAvg > priorAvg + 0.1,  // 0.1pp threshold
    latest: data[0].value,
    delta: recentAvg - priorAvg,
  };
}

// Did T10Y2Y go negative in past 6 months?
function inferYieldCurveHistory(t10y2yObs) {
  const data = (t10y2yObs || []).filter(o => o.value != null);
  // ~130 trading days = 6 months
  const history = data.slice(0, 130);
  const wasNegative = history.some(o => o.value < 0);
  const latest = data[0]?.value;
  const minInWindow = history.length > 0 ? Math.min(...history.map(o => o.value)) : null;
  return { wasNegative, latest, minInWindow };
}

async function fetchSectorRotation() {

  const all = await Promise.all([
    fetchAggregates('SPY', days),
    ...RRG_ETFS.map((t) => fetchAggregates(t, days)),

  const spyBars = all[0];
  if (!spyBars || spyBars.length < 28) return null;
  const spy = spyBars.map((b) => b.c);
  const spyN = spy.length;
  const spyLatest = spy[spyN - 1];
  const spyMid = spy[spyN - 14];
  const spyOld = spy[Math.max(0, spyN - 28)];
  const spyRecent = spyLatest / spyMid - 1;
  const spyOlder = spyMid / spyOld - 1;
  const placement = {};
  for (let i = 0; i < RRG_ETFS.length; i++) {
    const ticker = RRG_ETFS[i];
    const bars = all[i + 1];
    if (!bars || bars.length < 28) continue;
    const c = bars.map((b) => b.c);
    const n = c.length;
    const latest = c[n - 1];
    const mid = c[n - 14];
    const old = c[Math.max(0, n - 28)];
    const recent = latest / mid - 1;
    const older = mid / old - 1;
    const rs = recent - spyRecent;
    const rsOld = older - spyOlder;
    const momentum = rs - rsOld;
    let quadrant;
    if (rs > 0 && momentum > 0) quadrant = 'leading';
    else if (rs > 0 && momentum <= 0) quadrant = 'weakening';
    else if (rs <= 0 && momentum > 0) quadrant = 'improving';
    else quadrant = 'lagging';
    placement[ticker] = quadrant;
  }
  return { placement };
}

async function expandScenarioWithAI({ eventType, eventLabel, score, bandLabel, economicQuadrantLabel, redAlerts }) {
  const alertsDesc = redAlerts.length === 0
    ? '無紅色警報觸發'
    : redAlerts.map(a => a.name + '（' + a.severity + '）').join('、');

  const systemPrompt = '你是 MEP Trading System 的 macro 教練，基於 MimiVsJames 的「上帝視角」框架（流動性 + 週期 + 風險）。'
    + '你的回答必須是一個合法的 JSON object，不要加任何 markdown code fence 或解釋文字。'
    + 'JSON schema: { "bullish": { "title": string, "impact": string, "actions": [string, string, string, string] }, '
    + '"bearish": { "title": string, "impact": string, "actions": [string, string, string, string] } }';

  const userPrompt = '當前狀態：\n'
    + '- L2 Macro Score: ' + score.toFixed(0) + '/100（band: ' + bandLabel + '）\n'
    + '- 經濟週期: ' + economicQuadrantLabel + '\n'
    + '- 紅色警報: ' + alertsDesc + '\n'
    + '- 即將公布: ' + eventLabel + '\n\n'
    + '請為這個事件生成兩個劇本（利多 vs 利空）。每個劇本：\n'
    + '1. title: 簡短描述事件結果（中文，例如「CPI 大幅低於預期」）\n'
    + '2. impact: 對 macro 環境的影響（一句話，中文）\n'
    + '3. actions: 4 條具體執行清單（中文，每條短句，包含具體 ETF/工具/數字）\n\n'
    + '基於當前 L2 score 跟 alerts 調整 actions 的激進程度。如果有紅燈，actions 應強調防禦。'
    + '回傳純 JSON，無任何其他文字。';

  const res = await fetch(WORKER_URL + '/api/ai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5-20250929',
      max_tokens: 1500,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }],
    }),
  });

  if (!res.ok) {
    const text = await res.text();
    throw new Error('AI API failed: HTTP ' + res.status + ' - ' + text.slice(0, 200));
  }
  const data = await res.json();
  const textContent = data.content?.find(c => c.type === 'text')?.text || '';

  // Strip any markdown fences (defensive — system prompt asks for clean JSON)
  let jsonText = textContent.trim();
  jsonText = jsonText.replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/```\s*$/, '');

  let parsed;
  try {
    parsed = JSON.parse(jsonText);
  } catch (e) {
    throw new Error('AI response not valid JSON: ' + jsonText.slice(0, 200));
  }

  // Validate structure
  if (!parsed.bullish?.title || !parsed.bearish?.title) {
    throw new Error('AI response missing required fields (bullish/bearish/title)');
  }

  return parsed;
}

function L2MacroDashboard({ onScoreChange = null, portfolioTotal = null }) {

  // ──────────────────────────────────────────────────────────
  // FRED auto-sync handler
  // ──────────────────────────────────────────────────────────
  const syncFRED = useCallback(async () => {
    setFredStatus('fetching');
    setFredError(null);
    try {
      const data = await fetchFREDBatch();

      // Compute net liquidity 20MA
      const netLiq = computeNetLiquidityMA(
        data[FRED_SERIES.WALCL],
        data[FRED_SERIES.TGA],
        data[FRED_SERIES.RRP]
      );
      // T10Y2Y current + history
      const yieldCurve = inferYieldCurveHistory(data[FRED_SERIES.T10Y2Y]);
      // CPI trend
      const cpi = inferCpiTrend(data[FRED_SERIES.CPI]);
      // Unemployment trend
      const unemp = inferUnemploymentRising(data[FRED_SERIES.UNRATE]);
      // PMI proxy from Chicago Fed CFNAI-MA3 (FRED stopped publishing ISM in 2014)
      const pmiProxy = inferPMIFromCFNAI(data[FRED_SERIES.CFNAI]);

      // Apply auto-derived values to state
      if (netLiq) {
        setLiquidityAboveMA(netLiq.aboveMA);
      }
      if (yieldCurve.latest != null) {
        setT10y2yValue(yieldCurve.latest);
        setT10y2yWasNegative(yieldCurve.wasNegative);
      }
      if (cpi.trend) {

  // DERIVED VALUES
  // ──────────────────────────────────────────────────────────

function ScorecardBreakdown({ indicatorScores, moveValue, t10y2yValue, effectiveRrgCount, liquidityAboveMA, weightedTotal }) {
  const indicators = [
    {
      key: 'net_liquidity',
      def: INDICATORS.net_liquidity,
      readout: liquidityAboveMA ? '✓ Above 20MA' : '✗ Below 20MA',
      readoutColor: liquidityAboveMA ? '#10b981' : '#ef4444',
    },
    {
      key: 'move',
      def: INDICATORS.move,
      readout: moveValue.toFixed(0),
      readoutColor: moveValue < 100 ? '#10b981' : moveValue <= 120 ? '#EAB308' : '#ef4444',
    },
    {
      key: 't10y2y',
      def: INDICATORS.t10y2y,
      readout: t10y2yValue.toFixed(2) + '%',
      readoutColor: t10y2yValue < 0.20 ? '#10b981' : t10y2yValue <= 0.50 ? '#EAB308' : '#ef4444',
    },
    {
      key: 'rrg',
      def: INDICATORS.rrg,
      readout: effectiveRrgCount + ' Leading',
      readoutColor: effectiveRrgCount >= 2 ? '#10b981' : '#ef4444',
    },
  ];

  return (
    <div className="bg-card hair-border" style={{ borderRadius: '6px', padding: '18px' }}>
      <div className="section-title">
        <BarChart3 size={14} className="text-accent" />
        <span className="font-tc font-bold text-primary text-sm">評分明細 Scorecard Breakdown</span>
        <HelpTooltip text={'計算邏輯（加權總分 0–100）：\n• 淨流動性站上 20MA × 40%\n• SPX 站上 20MA × 30%\n• MOVE Index < 130 × 20%\n• T10Y2Y 利差 > 0.5% × 10%\n\n分數對應倉位帶：\n• 70–100 全面進攻（100% 部位）\n• 50–69 偏進攻（80%）\n• 30–49 中性偏防（50%）\n• <30 全面撤退（30%，啟動對沖）'} />
        <span className="text-xs text-muted-2 font-mono-dm" style={{ marginLeft: 'auto' }}>
          WEIGHTED · 0.4/0.3/0.2/0.1
        </span>
      </div>
      <div style={{ fontSize: '11px', color: '#9ca3af', fontFamily: 'Noto Sans TC', lineHeight: '1.55', marginTop: '6px', marginBottom: '14px' }}>
        ▸ 把今日 0–100 總分拆解 — 流動性、SPX、MOVE、利差、RRG 各佔多少分，找出今日主要扣分項。
      </div>

// ────────────────────────────── FREDSyncBar (NEW: auto-sync from FRED)
function FREDSyncBar({ status, syncTime, error, details, onSync }) {
  const colorMap = {
    idle:     { color: '#888',    label: 'IDLE' },
    fetching: { color: '#EAB308', label: 'FETCHING' },
    synced:   { color: '#10b981', label: 'SYNCED' },
    error:    { color: '#ef4444', label: '錯誤' },
  };
  const cfg = colorMap[status] || colorMap.idle;

  // Format relative time
  const timeAgo = !syncTime ? '—' : (() => {
    const diffSec = Math.floor((Date.now() - syncTime.getTime()) / 1000);
    if (diffSec < 60) return diffSec + 's';
    if (diffSec < 3600) return Math.floor(diffSec / 60) + 'm';
    return Math.floor(diffSec / 3600) + 'h';
  })();

  return (
    <div
      style={{
        background: '#0a0a0a',
        border: '1px solid ' + cfg.color + '30',
        borderRadius: '4px',
        padding: '10px 12px',
        marginBottom: '16px',
      }}
    >
      <div className="flex items-center justify-between gap-2">
        <div className="flex items-center gap-2">
          <div
            className={status === 'fetching' ? 'pulse-dot amber' : (status === 'synced' ? 'pulse-dot green' : (status === 'error' ? 'pulse-dot red' : ''))}
            style={status !== 'fetching' && status !== 'synced' && status !== 'error' ? {
              width: '6px', height: '6px', background: cfg.color, borderRadius: '50%',
            } : {}}
          />
          <span className="font-mono-dm" style={{ fontSize: '10px', letterSpacing: '0.1em', color: cfg.color, fontWeight: 600 }}>
            FRED · {cfg.label}
          </span>
        </div>
        <div className="flex items-center gap-2">
          {syncTime && status !== 'error' && (
            <span className="font-mono-dm text-muted-2" style={{ fontSize: '9px' }}>
              {timeAgo} ago
            </span>
          )}
          <button
            onClick={onSync}
            disabled={status === 'fetching'}
            className="icon-btn"
            style={{
              fontSize: '10px',
              padding: '3px 8px',
              borderColor: '#EAB308',
              color: '#EAB308',
              opacity: status === 'fetching' ? 0.5 : 1,
              cursor: status === 'fetching' ? 'wait' : 'pointer',
            }}
          >
            {status === 'fetching' ? '同步中…' : (status === 'synced' ? '↻ Re-sync' : '↻ Sync')}
          </button>
        </div>
      </div>

      {error && (
        <div className="text-xs text-red font-tc" style={{ fontSize: '10px', marginTop: '6px', lineHeight: 1.4 }}>
          {error}
        </div>
      )}

      {/* Show derived stats */}
      {details && status === 'synced' && (
        <div style={{ marginTop: '8px', fontSize: '9.5px', color: '#666', fontFamily: 'DM Mono' }}>
          <div className="flex justify-between" style={{ display: 'flex', justifyContent: 'space-between' }}>
            <span>淨流動性 vs 20MA</span>
            <span style={{ color: details.netLiq?.aboveMA ? '#10b981' : '#ef4444' }}>
              {details.netLiq?.aboveMA ? '+' : ''}{details.netLiq?.pctAboveMA?.toFixed(2) || '?'}%
            </span>
          </div>
          <div className="flex justify-between" style={{ display: 'flex', justifyContent: 'space-between' }}>
            <span>T10Y2Y latest</span>
            <span style={{ color: '#f4f4f4' }}>{details.yieldCurve?.latest?.toFixed(2) || '?'}%</span>
          </div>
          <div className="flex justify-between" style={{ display: 'flex', justifyContent: 'space-between' }}>
            <span>CPI YoY (latest)</span>
            <span style={{ color: '#f4f4f4' }}>{details.cpi?.latestYoY != null ? (details.cpi.latestYoY * 100).toFixed(2) + '%' : '?'}</span>
          </div>
          <div className="flex justify-between" style={{ display: 'flex', justifyContent: 'space-between' }}>
            <span>UNRATE latest</span>
            <span style={{ color: details.unemp?.rising ? '#fb923c' : '#10b981' }}>
              {details.unemp?.latest?.toFixed(1) || '?'}% {details.unemp?.rising ? '↑' : ''}
            </span>
          </div>
        </div>
      )}

      {!syncTime && status === 'idle' && (
        <div className="text-xs text-muted-2 font-tc" style={{ fontSize: '10px', marginTop: '4px' }}>
          首次同步將自動執行…
        </div>
      )}
    </div>
  );
}

// Compute β = cov(ticker, SPY) / var(SPY) using last N daily log returns from /aggregates.
// Defined here for Phase 4b consumption; not invoked yet.
async function computeBeta(ticker, days = 60) {
  const t = (ticker || '').toUpperCase().trim();
  if (!t || t === 'CASH') return null;
  if (t === 'SPY') return 1.0;
  const [tBars, sBars] = await Promise.all([
    fetchAggregates(t, days + 5),
    fetchAggregates('SPY', days + 5),
  ]);
  if (!tBars || !sBars) return null;
  const tByTs = new Map(tBars.map((b) => [b.t, b.c]));
  const sByTs = new Map(sBars.map((b) => [b.t, b.c]));
  const commonTs = [...sByTs.keys()].filter((ts) => tByTs.has(ts)).sort((a, b) => a - b);
  if (commonTs.length < 30) return null;
  const tRets = [];
  const sRets = [];
  for (let i = 1; i < commonTs.length; i++) {
    const tCur = tByTs.get(commonTs[i]);
    const tPrev = tByTs.get(commonTs[i - 1]);
    const sCur = sByTs.get(commonTs[i]);
    const sPrev = sByTs.get(commonTs[i - 1]);
    if (tPrev > 0 && sPrev > 0 && tCur > 0 && sCur > 0) {
      tRets.push(Math.log(tCur / tPrev));
      sRets.push(Math.log(sCur / sPrev));
    }
  }
  if (tRets.length < 20) return null;
  const meanT = tRets.reduce((a, x) => a + x, 0) / tRets.length;
  const meanS = sRets.reduce((a, x) => a + x, 0) / sRets.length;
  let cov = 0;
  let varS = 0;
  for (let i = 0; i < tRets.length; i++) {
    cov += (tRets[i] - meanT) * (sRets[i] - meanS);
    varS += (sRets[i] - meanS) ** 2;
  }
  if (varS <= 0) return null;
  return cov / varS;
}

// VIX option vega 簡化估算
// 注意：VIX option 的 vega 對應的是 VVIX (vol of vol)
// 這裡用粗略 approximation：moneyness × DTE-decay factor × base vega
// 真正精確值需要 BS pricing on VIX (which is non-trivial because VIX has mean reversion)
function estimateVixVega(vixSpot, strike, daysRemaining) {
  const moneyness = vixSpot / strike;
  const dteFactor = Math.sqrt(Math.max(daysRemaining, 1) / 30);

  let baseVega;
  if (moneyness > 0.95 && moneyness < 1.10) baseVega = 0.075;       // ATM / slight ITM
  else if (moneyness < 0.85) baseVega = 0.035;                       // deep OTM
  else if (moneyness > 1.20) baseVega = 0.040;                       // deep ITM
  else baseVega = 0.060;                                              // moderate OTM

  return baseVega * dteFactor;
}

// 估算事件後 option 的「殘存價值」(intrinsic + small remaining time value)
// 用於 IV-aware mode 的更精確 P&L
function estimateOptionValueAfter(strike, vixEnd, ivAfter, daysRemainingAfter) {
  const intrinsic = Math.max(0, vixEnd - strike);
  // Time value 隨 IV 與 sqrt(DTE) 衰減
  // 粗估：ATM 時 time value ≈ 0.04 × IV × sqrt(DTE/30)
  const moneyness = vixEnd / strike;
  let tvFactor;
  if (moneyness > 0.95 && moneyness < 1.10) tvFactor = 0.04;
  else if (moneyness < 0.80) tvFactor = 0.005;
  else if (moneyness > 1.30) tvFactor = 0.005;
  else tvFactor = 0.02;
  const timeValue = tvFactor * (ivAfter / 100) * vixEnd * Math.sqrt(Math.max(daysRemainingAfter, 0.5) / 30);
  return intrinsic + timeValue;
}

// 計算單腿 P&L (per leg, vs initial premium paid/received)
function calcLegPnL(leg, vixEnd, ivAfter, ivBefore, daysRemainingAfter, mode) {
  const sign = leg.action === 'BUY' ? 1 : -1;

  if (mode === 'simple') {
    // 到期內在價值，跟原版邏輯一樣
    const intrinsic = Math.max(0, vixEnd - leg.strike) * 100;
    const initialDebit = leg.premium * 100;
    // BUY: P&L = intrinsic - premium ; SELL: P&L = premium - intrinsic
    // 共通公式：sign × (intrinsic - premium)
    return sign * (intrinsic - initialDebit) * leg.qty;
  }

  // IV-aware: 殘存價值 = intrinsic + time value (含 IV)
  const valueAfter = estimateOptionValueAfter(leg.strike, vixEnd, ivAfter, daysRemainingAfter) * 100;
  const initialPrice = leg.premium * 100;
  return sign * (valueAfter - initialPrice) * leg.qty;
}

// 計算整個策略的 P&L
function calcStrategyPnL(strategy, vixEnd, ivAfter, ivBefore, daysRemainingAfter, mode) {
  return strategy.legs.reduce((sum, leg) => {
    return sum + calcLegPnL(leg, vixEnd, ivAfter, ivBefore, daysRemainingAfter, mode);
  }, 0);
}

// 計算 portfolio weighted beta
function calcPortfolioBeta(positions) {
  const totalValue = positions.reduce((sum, p) => sum + (p.value || 0), 0);
  if (totalValue <= 0) return 1.0;
  const weightedSum = positions.reduce((sum, p) => {
    return sum + (p.value || 0) * getBeta(p.ticker);
  }, 0);
  return weightedSum / totalValue;
}

// 單股事件對 QQQ 的 stress impact
// expected QQQ gap = stock_implied_move × stock_QQQ_weight × contagion_factor
function calcStressImpact({ impliedMove, qqqWeight, contagion, portfolioValue, qqqExposurePct }) {
  const qqqGapPct = impliedMove * qqqWeight * contagion;
  const exposureValue = portfolioValue * qqqExposurePct;
  const expectedLoss = exposureValue * qqqGapPct;
  return { qqqGapPct, exposureValue, expectedLoss };
}

// 推算 QQQ Put 對沖建議
function suggestQQQPut({ qqqPrice, expectedGapPct, expectedLoss, otmPct }) {
  const strike = Math.round((qqqPrice * (1 - otmPct)) * 4) / 4; // round to nearest $0.25
  const qqqEnd = qqqPrice * (1 - expectedGapPct);
  const perContractGain = Math.max(0, (strike - qqqEnd)) * 100;

  // 估算 Put premium：粗估 weekly ATM put 約 0.7-1.2% of underlying
  // OTM 略低
  const ivProxy = 0.20; // assume QQQ implied vol ~20%
  const dte = 7; // assume weekly hedge
  const estPremium = qqqPrice * ivProxy * Math.sqrt(dte / 365) * 0.4; // BS-ish proxy
  const otmDiscount = Math.max(0.5, 1 - otmPct * 25); // OTM 越深越便宜
  const adjustedPremium = estPremium * otmDiscount;

  const contracts = perContractGain > 0 ? Math.ceil(expectedLoss / perContractGain) : 0;
  const totalCost = contracts * adjustedPremium * 100;

  return {
    strike,
    qqqEnd,
    perContractGain,
    estPremium: adjustedPremium,
    contracts,
    totalCost,
    coverageRatio: contracts > 0 && expectedLoss > 0
      ? (contracts * perContractGain) / expectedLoss
      : 0,
  };
}

      confidence: 'WAIT',
      tone: 'wait',

    return {
      id: null,
      label: '建議等待 / 不進場',
      reason: 'T-' + daysToEvent + ' 已晚，IV 已被推高到最貴，胃口差且事件後 IV crush 風險最大',
      confidence: 'WAIT',
      tone: 'wait',
    };
  }

  // 黃金窗口 T-7 ~ T-3 — 主要邏輯
  if (daysToEvent >= 3 && daysToEvent <= 7) {
    if (ivr >= 70) {
      return {
        id: 'spread_16_20',

        reason: 'IVR ' + ivr + ' 高位 + T-' + daysToEvent + ' → Spread 雙腿抵消 vega 是抗 IV Crush 唯一解',
        confidence: 'HIGH',

        reason: 'IVR ' + ivr + ' 低 + T-' + daysToEvent + ' → 純買方便宜，70% 主力 + 30% 樂透吃 vega 順風 + 黑天鵝彩券',
        confidence: 'HIGH',
        tone: 'go',
      };
    }
    return {
      id: 'spread_16_20',
      label: '推薦：16/20 Call Spread',
      reason: 'IVR ' + ivr + ' 中等 + T-' + daysToEvent + ' → Spread 平衡型，IV crush 風險受控且成本親民',
      confidence: 'MEDIUM',
      tone: 'go',
    };
  }

  // T-2 ~ T-1 IV 已經偏貴
  if (daysToEvent >= 1 && daysToEvent <= 2) {
    if (ivr >= 70) {
      return {
        id: 'spread_16_20',
        label: '推薦：16/20 Call Spread (謹慎)',
        reason: 'IVR ' + ivr + ' 已高 + T-' + daysToEvent + ' → 只能 Spread，純買方會被 IV crush 雙殺',
        confidence: 'MEDIUM',
        tone: 'caution',
      };
    }
    return {
      id: 'spread_16_20',
      label: '推薦：16/20 Call Spread',
      reason: 'T-' + daysToEvent + ' 接近事件，Spread 是僅存的安全選擇',
      confidence: 'MEDIUM',
      tone: 'caution',
    };
  }

  // T-8 ~ T-14 還可以早佈
  if (ivr < 40) {
    return {
      id: 'single_18',
      label: '推薦：純 18 Call',
      reason: 'T-' + daysToEvent + ' 早期 + IVR ' + ivr + ' 低 → 純買方還沒被推高，先卡位',
      confidence: 'MEDIUM',
      tone: 'go',
    };
  }
  return {
    id: 'spread_16_20',
    label: '推薦：16/20 Call Spread',
    reason: 'T-' + daysToEvent + ' + IVR ' + ivr + ' → Spread 平衡風險',
    confidence: 'MEDIUM',
    tone: 'go',
  };
}

              {autoSyncPV ? (
                <div className="bg-subcard hair-border" style={{
                  padding: '8px 10px',
                  borderRadius: '4px',

                  <div className="font-mono-dm tabular text-accent" style={{ fontSize: '18px', fontWeight: 500 }}>

                  <div className="text-xs text-muted-2 font-mono-dm" style={{ marginTop: '2px' }}>

                  type="number"

                  onChange={(e) => setPortfolioValueManual(Number(e.target.value))}

                />

            </div>

            <div className="mb-4">
              <div className="flex items-center justify-between mb-1">
                <label className="text-xs text-muted font-tc">避險預算</label>
                <span className="font-mono-dm tabular text-accent text-xs">
                  {hedgeBudgetBps} bps · {formatMoney(hedgeBudget)}
                </span>
              </div>
              <input
                type="range"
                min="10"
                max="100"
                step="5"

                onChange={(e) => setHedgeBudgetBps(Number(e.target.value))}

              />
              <div className="flex justify-between text-xs text-muted-2 font-mono-dm mt-1">
                <span>10 bps</span><span>50</span><span>100</span>
              </div>

            {/* Section: Event */}
            <div className="section-title" style={{ marginTop: '24px' }}>
              <Clock size={13} className="text-accent" />
              <span className="font-mono-dm text-xs text-muted" style={{ letterSpacing: '0.1em' }}>EVENT</span>
            </div>

            <div className="mb-4">
              <label className="text-xs text-muted font-tc block mb-1">事件類型</label>
              <select
                value={eventType}

                className="num-input"
                style={{ padding: '6px 10px' }}
              >
                <option value="FOMC">FOMC（聯準會）</option>
                <option value="CPI">CPI（通膨數據）</option>
                <option value="EARNINGS">財報季</option>
                <option value="ELECTION">政治事件</option>
                <option value="OTHER">其他</option>
              </select>
            </div>

            <div className="mb-4">
              <div className="flex items-center justify-between mb-1">
                <label className="text-xs text-muted font-tc">距事件天數</label>
                <span className="font-mono-dm tabular text-accent text-xs">T-{daysToEvent}</span>
              </div>
              <input
                type="range"
                min="0"
                max="21"
                step="1"
                value={daysToEvent}
                onChange={(e) => setDaysToEvent(Number(e.target.value))}

              />
              <div className="flex justify-between text-xs text-muted-2 font-mono-dm mt-1">
                <span>T-0</span><span>T-7</span><span>T-14</span><span>T-21</span>
              </div>
            </div>

            {/* Section: VIX */}
            <div className="section-title" style={{ marginTop: '24px' }}>
              <Activity size={13} className="text-accent" />
              <span className="font-mono-dm text-xs text-muted" style={{ letterSpacing: '0.1em' }}>VIX</span>
            </div>

            <div className="grid grid-cols-2 gap-3 mb-4">
              <div>
                <label className="text-xs text-muted font-tc block mb-1">現價</label>
                <input
                  type="number"
                  step="0.01"
                  value={vixPrice}
                  onChange={(e) => setVixPrice(Number(e.target.value))}
                  className="num-input"
                />
              </div>
              <div>
                <label className="text-xs text-muted font-tc block mb-1">IV Rank</label>
                <input
                  type="number"
                  step="1"
                  min="0"
                  max="100"
                  value={vixIvRank}
                  onChange={(e) => setVixIvRank(Number(e.target.value))}
                  className="num-input"
                />
              </div>
            </div>

            {/* Section: IV Crush 模型參數 */}
            <div className="section-title" style={{ marginTop: '24px' }}>
              <Wind size={13} className="text-accent" />
              <span className="font-mono-dm text-xs text-muted" style={{ letterSpacing: '0.1em' }}>IV CRUSH MODEL</span>
            </div>

            <div className="grid grid-cols-2 gap-3 mb-3">
              <div>
                <label className="text-xs text-muted font-tc block mb-1">事件前 IV</label>
                <input
                  type="number"
                  step="1"
                  value={vixIvBefore}
                  onChange={(e) => setVixIvBefore(Number(e.target.value))}
                  className="num-input"
                />
              </div>
              <div>
                <label className="text-xs text-muted font-tc block mb-1">事件後 IV</label>
                <input
                  type="number"
                  step="1"
                  value={vixIvAfter}
                  onChange={(e) => setVixIvAfter(Number(e.target.value))}
                  className="num-input"
                  style={{ borderColor: vixIvAfter < vixIvBefore - 20 ? '#ef4444' : '#2a2a2a' }}
                />
              </div>
            </div>
            <div className="mb-3">
              <label className="text-xs text-muted font-tc block mb-1">事件後剩餘 DTE</label>
              <input
                type="number"
                step="1"
                min="0"
                value={daysAfterEvent}
                onChange={(e) => setDaysAfterEvent(Number(e.target.value))}
                className="num-input"
              />

            <div className="bg-subcard hair-border text-xs text-muted-2 font-tc" style={{
              padding: '6px 8px', borderRadius: '4px', fontSize: '10px', lineHeight: 1.5,
            }}>
              IV 從 {vixIvBefore} → {vixIvAfter}（Δ {(vixIvAfter - vixIvBefore).toFixed(0)}），影響事件後剩餘時間價值
            </div>

            {/* Section: Option Chain */}
            <div className="section-title" style={{ marginTop: '24px', display: 'flex', alignItems: 'center', gap: '6px' }}>
              <Layers size={13} className="text-accent" />
              <span className="font-mono-dm text-xs text-muted" style={{ letterSpacing: '0.1em' }}>VIX CALL CHAIN</span>
              <button
                onClick={fetchVIXChain}
                disabled={chainStatus === 'fetching'}
                style={{
                  marginLeft: 'auto',
                  fontSize: '10px',
                  padding: '3px 8px',
                  borderRadius: '3px',
                  border: '1px solid ' + (chainStatus === 'error' ? '#ef4444' : chainStatus === 'synced' ? '#10b981' : '#2a2a2a'),
                  background: 'transparent',
                  color: chainStatus === 'error' ? '#ef4444' : chainStatus === 'synced' ? '#10b981' : '#EAB308',
                  cursor: chainStatus === 'fetching' ? 'wait' : 'pointer',
                  fontFamily: 'DM Mono',
                  letterSpacing: '0.05em',
                }}
                title={'從 Polygon 抓 ' + targetExpiry + ' 到期的 16/18/20/22C premium'}
              >
                {chainStatus === 'fetching' ? '⋯ 抓取中' : chainStatus === 'synced' ? '✓ 已同步' : chainStatus === 'error' ? '✕ 失敗' : '↻ 從 Polygon 自動填'}
              </button>
            </div>
            {chainStatus === 'synced' && chainSyncTime && (
              <div style={{ fontSize: '10px', color: '#888', fontFamily: 'DM Mono', marginTop: '4px', marginBottom: '6px' }}>
                expiry {targetExpiry} · {Math.round((Date.now() - chainSyncTime.getTime()) / 1000)}s ago
              </div>
            )}
            {chainStatus === 'error' && chainError && (
              <div style={{ fontSize: '10px', color: '#ef4444', marginTop: '4px', marginBottom: '6px', lineHeight: '1.4' }}>
                {chainError.slice(0, 120)}
              </div>
            )}

            <div className="grid grid-cols-2 gap-2">
              <PremiumInput label="16C" value={call16Premium} onChange={setCall16Premium} />
              <PremiumInput label="18C" value={call18Premium} onChange={setCall18Premium} accent />
              <PremiumInput label="20C" value={call20Premium} onChange={setCall20Premium} />
              <PremiumInput label="22C" value={call22Premium} onChange={setCall22Premium} muted />
            </div>
          </div>

          {/* ────────────────────────────── RIGHT: Main Content */}
          <div style={{ padding: '24px 28px', display: 'flex', flexDirection: 'column', gap: '24px' }}>

            {/* ═══════════════════════════════════════ L2 Macro Context (if provided) */}
            {(externalMacroScore != null || (externalMacroAlerts && externalMacroAlerts.length > 0)) && (
              <MacroContextBanner
                score={externalMacroScore}
                band={externalMacroBand}
                alerts={externalMacroAlerts || []}
                hedgeBudgetBps={externalHedgeBudgetBps}
              />
            )}

            {/* ═══════════════════════════════════════ Recommendation Banner */}
            <RecommendationBanner
              rec={recommendation}
              onApply={(id) => id && setSelectedStructure(id)}
              currentSelection={selectedStructure}
              ivr={vixIvRank}
              dte={daysToEvent}
              eventType={eventType}
            />

            {/* ═══════════════════════════════════════ Strategy Cards */}
            <div>
              <div className="section-title">
                <Shield size={14} className="text-accent" />
                <span className="font-tc font-bold text-primary" style={{ fontSize: '14px' }}>避險策略選擇</span>
                <span className="text-xs text-muted-2 font-mono-dm" style={{ marginLeft: 'auto' }}>
                  3 STRUCTURES
                </span>
              </div>

              <div className="grid grid-cols-3 gap-3" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '12px' }}>
                <StrategyCard
                  id="single_18"
                  strat={stratA}
                  selected={selectedStructure === 'single_18'}
                  onSelect={setSelectedStructure}
                  badge="A · LINEAR"
                  recommended={recommendation.id === 'single_18'}
                />
                <StrategyCard
                  id="spread_16_20"
                  strat={stratB}
                  selected={selectedStructure === 'spread_16_20'}
                  onSelect={setSelectedStructure}
                  badge="B · SPREAD"
                  recommended={recommendation.id === 'spread_16_20'}
                />
                <StrategyCard
                  id="mixed"
                  strat={stratC}
                  selected={selectedStructure === 'mixed'}
                  onSelect={setSelectedStructure}
                  badge="C · MIXED"
                  recommended={recommendation.id === 'mixed'}
                />
              </div>

              {/* Net Vega indicator */}
              <div className="mt-3 grid grid-cols-3 gap-3" style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '12px' }}>
                <VegaImpactBadge strat={stratA} ivDelta={vixIvAfter - vixIvBefore} />
                <VegaImpactBadge strat={stratB} ivDelta={vixIvAfter - vixIvBefore} />
                <VegaImpactBadge strat={stratC} ivDelta={vixIvAfter - vixIvBefore} />
              </div>
            </div>

            {/* ═══════════════════════════════════════ Scenarios Table */}
            <div className="bg-card hair-border" style={{ borderRadius: '6px', padding: '18px' }}>
              <div className="flex items-center justify-between mb-3">
                <div className="flex items-center gap-2">
                  <BarChart3 size={14} className="text-accent" />
                  <span className="font-tc font-bold text-primary text-sm">情境 P&L 分析</span>
                  <HelpTooltip text={'三個 macro scenario 的持倉 P&L 推算：\n\n樂觀 (+5% SPX)：預估獲利\n基準 (持平)：時間衰減成本\n悲觀 (–5% SPX)：最大回撤估算\n\n含 Greek 計算：\n損益 ≈ Delta × Beta × ΔSPX × 持倉值'} />
                </div>
                <PnLModeToggle mode={pnlMode} setMode={setPnlMode} />
              </div>
              <div style={{ fontSize: '11px', color: '#9ca3af', fontFamily: 'Noto Sans TC', lineHeight: '1.55', marginTop: '-4px', marginBottom: '14px' }}>
                ▸ 在不同 macro scenario（樂觀／基準／悲觀）下，目前持倉組合的盈虧推算與最大回撤估算。
              </div>

              <div style={{ overflowX: 'auto' }}>
                <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '12px' }} className="font-mono-dm tabular">
                  <thead>
                    <tr className="hair-border-b">
                      <th style={{ textAlign: 'left', padding: '8px 6px', color: '#888', fontWeight: 500 }}>情境</th>
                      <th style={{ textAlign: 'right', padding: '8px 6px', color: '#888', fontWeight: 500 }}>VIX 收</th>
                      <th style={{ textAlign: 'right', padding: '8px 6px', color: '#888', fontWeight: 500 }}>組合衝擊</th>
                      <th style={{ textAlign: 'right', padding: '8px 6px', color: '#888', fontWeight: 500 }}>A 純買</th>
                      <th style={{ textAlign: 'right', padding: '8px 6px', color: '#888', fontWeight: 500 }}>B Spread</th>
                      <th style={{ textAlign: 'right', padding: '8px 6px', color: '#888', fontWeight: 500 }}>C 混搭</th>
                      <th style={{ textAlign: 'right', padding: '8px 6px', color: '#EAB308', fontWeight: 500 }}>淨 (選中)</th>
                    </tr>
                  </thead>
                  <tbody>
                    {vixScenarios.map((s, idx) => {
                      const selectedNet = selectedStructure === 'single_18' ? s.netA :
                                          selectedStructure === 'spread_16_20' ? s.netB : s.netC;
                      return (
                        <tr key={idx} className="hair-border-b pos-row">
                          <td style={{ padding: '8px 6px' }} className="font-tc text-xs text-primary">{s.desc}</td>
                          <td style={{ padding: '8px 6px', textAlign: 'right', color: '#f4f4f4' }}>{s.end.toFixed(2)}</td>
                          <td style={{ padding: '8px 6px', textAlign: 'right' }}>
                            <span style={{ color: s.portfolioImpact < 0 ? '#ef4444' : s.portfolioImpact > 0 ? '#10b981' : '#555' }}>
                              {(s.portfolioImpact * 100).toFixed(2)}%
                            </span>
                          </td>
                          <td style={{ padding: '8px 6px', textAlign: 'right' }}>
                            <PnLCell value={s.pnl_A} />
                          </td>
                          <td style={{ padding: '8px 6px', textAlign: 'right' }}>
                            <PnLCell value={s.pnl_B} />
                          </td>
                          <td style={{ padding: '8px 6px', textAlign: 'right' }}>
                            <PnLCell value={s.pnl_C} />
                          </td>
                          <td style={{ padding: '8px 6px', textAlign: 'right' }}>
                            <PnLCell value={selectedNet} highlight />
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>

              <div className="mt-3 text-xs text-muted-2 font-tc" style={{ fontSize: '10.5px', lineHeight: 1.5 }}>
                {pnlMode === 'simple' ? (
                  <>「Simple」模式：到期內在價值，不計 IV crush 與時間價值。適合「持有到到期」且 VIX 大漲的情境。</>
                ) : (
                  <>「IV-Aware」模式：含事件後 IV 從 {vixIvBefore} → {vixIvAfter} 的時間價值衰減 + 殘存 {daysAfterEvent} DTE。Spread 因 net vega 接近 0，IV crush 影響小。</>
                )}
              </div>
            </div>

            {/* ═══════════════════════════════════════ Portfolio Beta Section */}
            <PortfolioBetaSection
              positions={positions}
              positionsTotal={positionsTotal}
              portfolioBeta={portfolioBeta}
              vixToPortfolioBeta={vixToPortfolioBeta}
              externalConnected={!!externalPositions}
              newPosTicker={newPosTicker}
              setNewPosTicker={setNewPosTicker}
              newPosValue={newPosValue}
              setNewPosValue={setNewPosValue}
              onAdd={handleAddPosition}
              onDelete={handleDeletePosition}
              onUpdate={handleUpdatePosition}
            />

            {/* ═══════════════════════════════════════ Single Stock Stress Test */}
            <StockStressSection
              stressTicker={stressTicker}
              setStressTicker={setStressTicker}
              stressImpliedMove={stressImpliedMove}
              setStressImpliedMove={setStressImpliedMove}
              fetchStressStraddle={fetchStressStraddle}
              straddleStatus={straddleStatus}
              straddleError={straddleError}
              straddleSyncTime={straddleSyncTime}
              targetExpiry={targetExpiry}
              stressQQQWeight={stressQQQWeight}
              setStressQQQWeight={setStressQQQWeight}
              stressContagion={stressContagion}
              setStressContagion={setStressContagion}
              qqqPrice={qqqPrice}
              setQqqPrice={setQqqPrice}
              qqqExposurePct={qqqExposurePct}
              setQqqExposurePct={setQqqExposurePct}
              qqqPutOTMPct={qqqPutOTMPct}
              setQqqPutOTMPct={setQqqPutOTMPct}
              stressResult={stressResult}
              qqqPutSuggestion={qqqPutSuggestion}
              portfolioValue={portfolioValue}
            />

            {/* ═══════════════════════════════════════ Timing Checklist */}
            <div className="bg-card hair-border" style={{ borderRadius: '6px', padding: '18px' }}>
              <div className="section-title" style={{ marginBottom: '12px', paddingBottom: '8px' }}>
                <Clock size={14} className="text-accent" />
                <span className="font-tc font-bold text-primary text-sm">進場時機紀律</span>
                <HelpTooltip text={'T-N 天執行檢核表：\n\nT–7：觀察 IV / 波動率變化\nT–3：確認 catalyst 強度\nT–1：開倉 / 加碼最後機會\nT+0：事件當日決策\nT+1：結算 / 停損\n\n避免「事件前慌張開倉、事件後遲遲不停損」'} />
                <span className="text-xs text-muted-2 font-mono-dm" style={{ marginLeft: 'auto' }}>T-{daysToEvent}</span>
              </div>
              <div style={{ fontSize: '11px', color: '#9ca3af', fontFamily: 'Noto Sans TC', lineHeight: '1.55', marginTop: '-4px', marginBottom: '12px' }}>
                ▸ 距事件 T-N 天的進場節奏檢核 — 提醒何時該開倉、加碼、停損，避免情緒化操作。
              </div>
              <div className="grid grid-cols-1 gap-2">
                <TimingRow
                  label="T-14 之外（太早，IV 還沒升溫）"
                  status={daysToEvent <= 14}
                  tip="過早建倉會被 theta 慢慢吃掉"
                />
                <TimingRow
                  label="T-7 ~ T-3 黃金佈局窗口"
                  status={daysToEvent >= 3 && daysToEvent <= 7}
                  tip="IV 升溫但未到峰值，胃口最佳"
                />
                <TimingRow
                  label="T-1 之內（已晚，IV 推到最高）"
                  status={daysToEvent <= 1}
                  tip="避免事件公布前 IV 最後衝高，IV crush 風險最大"
                />
                <TimingRow
                  label="事件後 IV Crush 前分批落袋"
                  status={true}
                  tip="事件後 VIX 若衝高到 19-20 → 立刻部分獲利"
                />
                <TimingRow
                  label="最晚持有到下週五（三巫日後）"
                  status={daysToEvent <= 10}
                  tip="短天期避險不應跨月"
                />
              </div>
            </div>

            {/* ═══════════════════════════════════════ Modeling Notes */}
            <div className="bg-deepcard hair-border" style={{ borderRadius: '6px', padding: '14px 18px' }}>
              <div className="flex items-start gap-2">
                <Info size={13} className="text-muted" style={{ marginTop: '3px', flexShrink: 0 }} />
                <div className="text-xs text-muted font-tc" style={{ lineHeight: 1.7 }}>
                  <div className="mb-2 font-mono-dm text-muted-2" style={{ fontSize: '9.5px', letterSpacing: '0.12em' }}>MODEL ASSUMPTIONS · v2</div>
                  <div className="mb-1.5">
                    <span className="text-accent font-mono-dm" style={{ fontSize: '10.5px' }}>[A] IV-Aware P&L</span>
                    {' — '}使用 vega-shortcut（base vega × moneyness × √(DTE/30)）估算殘存時間價值。**非 Black-Scholes pricing**；VIX 期權真實 vega 需考慮 mean reversion 與 VVIX。誤差量級 ±15-25%。
                  </div>
                  <div className="mb-1.5">
                    <span className="text-accent font-mono-dm" style={{ fontSize: '10.5px' }}>[B] Single Stock Stress</span>
                    {' — '}用 implied move × QQQ權重 × contagion 簡化估算。沒有 cross-sectional vol surface、沒有 sector ETF spillover modeling。實際單股事件對指數衝擊可能差 ±30%。
                  </div>
                  <div className="mb-1.5">
                    <span className="text-accent font-mono-dm" style={{ fontSize: '10.5px' }}>[C] Portfolio Beta</span>
                    {' — '}用內建 lookup table 的 to-SPY beta，找不到的 ticker 預設 1.10。Beta 是歷史平均，事件期間個股 beta 會大幅偏離（例如 NVDA 財報日 beta 可能瞬間到 3+）。
                  </div>
                  <div>
                    <span className="text-accent font-mono-dm" style={{ fontSize: '10.5px' }}>[D] Recommendation Engine</span>
                    {' — '}只看 IVR + DTE + event type。沒看 GEX、term structure、skew、機構 positioning。建議當作「初稿選擇」而非最終決策。
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        {/* Footer */}
        <div className="hair-border-t text-xs text-muted-2 font-mono-dm" style={{ padding: '16px 28px' }}>
          <div className="flex items-center justify-between flex-wrap gap-2">
            <span>MEP / Portfolio Layer · VIX Hedge Calculator v2 · 基於 MimiVsJames 2025-09-17 教學</span>
            <span>避險不是投機 — 成本最小化下的尾部保護</span>
          </div>
        </div>
      </div>

      <style dangerouslySetInnerHTML={{ __html: '\n        @media (max-width: 900px) {\n          .main-grid {\n            grid-template-columns: 1fr !important;\n          }\n        }\n      ' }} />
    </>
  );
}

// ────────────────────────────── Strategy Card (existing, slightly enhanced)
function StrategyCard({ id, strat, selected, onSelect, badge, recommended }) {
  return (

// ────────────────────────────── Vega Impact Badge (NEW)
function VegaImpactBadge({ strat, ivDelta }) {
  // ivDelta < 0 = IV crush
  // long vega + IV crush = loss; short vega + IV crush = gain
  const vegaLoss = strat.netVega * 100 * ivDelta;
  const isCrushSafe = Math.abs(strat.netVega) < 0.5; // spread ~ neutral
  const tone = isCrushSafe ? 'green' : (vegaLoss < -200 ? 'red' : 'orange');
  const color = tone === 'green' ? '#10b981' : tone === 'red' ? '#ef4444' : '#fb923c';
  const label = isCrushSafe ? 'NET VEGA ≈ 0' : ('NET VEGA ' + (strat.netVega > 0 ? '+' : '') + strat.netVega.toFixed(1));

  return (
    <div className="bg-subcard hair-border" style={{
      borderRadius: '4px',
      padding: '6px 10px',
      borderColor: color + '30',
    }}>
      <div className="flex items-center justify-between">
        <span className="font-mono-dm" style={{ fontSize: '9.5px', color, letterSpacing: '0.08em' }}>
          {label}
        </span>
        <span className="font-mono-dm tabular" style={{ fontSize: '11px', color: vegaLoss < 0 ? '#ef4444' : '#10b981' }}>
          {ivDelta !== 0 ? formatMoney(vegaLoss) : '—'}
        </span>
      </div>
      <div className="text-xs text-muted-2 font-tc" style={{ fontSize: '9px', marginTop: '1px' }}>
        若 IV {ivDelta > 0 ? '+' : ''}{ivDelta.toFixed(0)} → vega 影響
      </div>
    </div>
  );
}

// 將 Supabase positions 表的一行映射成 L1 元件需要的 { id, ticker, value }
// 注意：positions 表混合了 stock 與 option。Option 有 100x multiplier。
// Mark-to-market value：
//   - Stock (option_type 為 null/'STOCK'): qty × current_price
//   - Option ('CALL'/'PUT'): qty × current_price × 100 (per-contract multiplier)
function mapSupabasePosition(row) {
  const isOption = row.option_type && ['CALL', 'PUT', 'CALL_LONG', 'CALL_SHORT', 'PUT_LONG', 'PUT_SHORT'].includes(row.option_type.toUpperCase());
  const multiplier = isOption ? 100 : 1;
  const value = (row.qty || 0) * (row.current_price || 0) * multiplier;
  return {
    // ── identity & primary aggregate
    id: row.id,
    ticker: (row.ticker || '').toUpperCase(),
    value,
    // ── flat fields (so PositionsManager + L1/L2 can read directly without _meta)
    option_type: row.option_type,
    qty: row.qty,
    current_price: row.current_price,
    cost: row.cost,
    strike: row.strike,
    expiry: row.expiry,
    note: row.note,
    isOption,
    // ── legacy structure preserved for any consumer still using _meta
    _meta: {
      isOption,
      optionType: row.option_type,
      qty: row.qty,
      currentPrice: row.current_price,
      cost: row.cost,
      strike: row.strike,
      expiry: row.expiry,
      note: row.note,
    },
  };
}

const formatTimestamp = (date) => {
  if (!date) return '—';
  const now = new Date();
  const diffMs = now - date;
  const diffSec = Math.floor(diffMs / 1000);
  if (diffSec < 60) return diffSec + 's ago';
  if (diffSec < 3600) return Math.floor(diffSec / 60) + 'm ago';
  return Math.floor(diffSec / 3600) + 'h ago';
};

const formatMoney = (n) => {
  if (!isFinite(n)) return '—';
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1_000_000) return sign + '$' + (abs / 1_000_000).toFixed(2) + 'M';
  if (abs >= 1_000) return sign + '$' + (abs / 1_000).toFixed(1) + 'K';
  return sign + '$' + abs.toFixed(0);
};
